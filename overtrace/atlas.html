    <style>
      :root {
        --bg: #f2f2f2;
        --panel: #ffffff;
        --ink: #111111;
        --muted: #666666;
        --line: rgba(0, 0, 0, 0.12);
        --hover: rgba(0, 0, 0, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
      }

      body {
        font: 500 14px/1.45 var(--ot-font-sans);
        background: var(--bg);
        color: var(--ink);
      }

      body.research-page {
        min-height: 100vh;
        overflow: hidden;
      }

      .research-view {
        height: 100vh;
        display: grid;
        align-content: start;
        gap: 14px;
        padding: calc(var(--ts-toolbar-safe-top) + 4px) 14px 14px;
        overflow: auto;
      }

      .project-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 14px;
      }

      .project-card {
        display: grid;
        grid-template-rows: auto auto;
        border: 1px solid var(--ts-toolbar-border);
        border-radius: calc(var(--ts-radius-panel) + 2px);
        background: rgba(255, 255, 255, 0.92);
        overflow: hidden;
        box-shadow: var(--ts-toolbar-panel-shadow);
      }

      .project-preview {
        position: relative;
        display: block;
        aspect-ratio: 3 / 4;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(0, 0, 0, 0.08), transparent 44%),
          linear-gradient(180deg, #f7f7f7, #ececec);
        color: inherit;
        text-decoration: none;
      }

      .project-still,
      .project-hover-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 180ms ease;
      }

      .project-card.is-still-ready .project-still {
        opacity: 1;
      }

      .project-hover-preview {
        position: absolute;
        inset: 0;
        opacity: 0;
        pointer-events: none;
        transition: opacity 120ms ease;
      }

      .project-card.has-hover-images:hover .project-hover-preview,
      .project-card.has-hover-images:focus-within .project-hover-preview,
      .project-card.is-hover-active .project-hover-preview {
        opacity: 1;
      }

      .project-card.has-hover-images:hover .project-still,
      .project-card.has-hover-images:focus-within .project-still,
      .project-card.is-hover-active .project-still {
        opacity: 0.18;
      }

      .project-card.is-still-ready .project-placeholder {
        background: linear-gradient(180deg, rgba(17, 17, 17, 0.02), rgba(17, 17, 17, 0.18));
      }

      .project-card.is-preview-missing .project-placeholder {
        background:
          linear-gradient(160deg, rgba(17, 17, 17, 0.07), rgba(17, 17, 17, 0.14)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(245, 245, 245, 0.96));
      }

      .project-placeholder {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.36));
        transition: background-color 180ms ease, color 180ms ease;
      }

      .project-meta-panel {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 14px 16px 16px;
      }

      .project-name {
        margin: 0;
        font-size: 19px;
        line-height: 1;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .project-actions {
        display: flex;
        gap: 8px;
      }

      .project-action {
        width: 40px;
        height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: var(--ts-radius-control);
        background: rgba(255, 255, 255, 0.76);
        color: #111111;
        text-decoration: none;
        transition: background-color 120ms ease, border-color 120ms ease;
      }

      .project-action:hover {
        background: var(--hover);
        border-color: rgba(17, 17, 17, 0.18);
      }

      .project-action .material-symbols-outlined {
        font-size: 20px;
      }

      @media (max-width: 1600px) {
        .project-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (max-width: 1320px) {
        .project-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 980px) {
        .project-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .project-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>

      </div>
      <div class="nav-center"></div>
      <div class="nav-right">
        <a
          class="icon-btn switch-btn section-btn is-active"

          aria-current="page"
        >

        <a class="icon-btn switch-btn section-btn" href="./index.html" data-tip="Go to Editor">

        <a

    <main class="research-view">
      <section id="projectGrid" class="project-grid" aria-label="Projects"></section>
    </main>
    <script>
      const PROJECTS = [
        "1_linguistic",
        "2_media",
        "3_cognitive",
        "4_metric",
        "5_symbolic",
        "6_cultural",
        "7_social",
        "8_bureaucratic",
        "9_ecological",
        "10_infrastructural",
      ].map((id) => {
        const meta = window.OvertraceUI?.getProjectDisplayMeta?.(id);
        return meta || { id, name: id, displayName: id };
      });

      const projectGrid = document.getElementById("projectGrid");
      const projectDataCache = new Map();
      const projectSnapshotCache = new Map();

      function nodePayload(rawNode) {
        if (!rawNode || typeof rawNode !== "object") return {};
        if (rawNode.data && typeof rawNode.data === "object") return rawNode.data;
        return rawNode;
      }

      function hash(value) {
        let h = 2166136261;
        const text = String(value || "");
        for (let i = 0; i < text.length; i += 1) {
          h ^= text.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      }

      function parseDateSafe(value) {
        const time = Date.parse(String(value || ""));
        return Number.isFinite(time) ? time : null;
      }

      function areaLaneKey(areas, fallbackId) {
        const scores = {
          speculative: 0,
          communication: 0,
          interaction: 0,
        };
        const list = Array.isArray(areas) ? areas : [areas];
        for (const area of list) {
          const text = String(area || "").toLowerCase();
          if (!text) continue;
          if (text.includes("specul")) scores.speculative += 1;
          if (text.includes("comunic") || text.includes("communicat")) {
            scores.communication += 1;
          }
          if (text.includes("inter")) scores.interaction += 1;
        }
        const best = Object.entries(scores).sort((a, b) => b[1] - a[1])[0];
        if (best && best[1] > 0) return best[0];
        const roll = hash(`${fallbackId}_lane`) % 3;
        if (roll === 0) return "speculative";
        if (roll === 1) return "communication";
        return "interaction";
      }

      function isImageFile(file) {
        const probe = String(file?.path || file?.url || file?.name || "").toLowerCase();
        if (!probe) return false;
        return !!file?.isImage || /\.(avif|gif|jpe?g|png|svg|webp)$/i.test(probe);
      }

      function resolveProjectAssetSrc(projectId, file) {
        const raw = String(file?.path || file?.url || file?.name || "").trim();
        if (!raw) return "";
        return `./${projectId}/${raw.replace(/^\.\//, "")}`;
      }

      async function resolveProjectData(projectId) {
        if (projectDataCache.has(projectId)) return projectDataCache.get(projectId);
        const promise = (async () => {
          const out = {
            project: null,
            imageSources: [],
          };
          try {
            const res = await fetch(`./${projectId}/project.json`, {
              cache: "no-store",
            });
            if (!res.ok) return out;
            const project = await res.json();
            const imageSources = (Array.isArray(project?.nodes) ? project.nodes : [])
              .map(nodePayload)
              .flatMap((node) => (Array.isArray(node?.files) ? node.files : []))
              .filter((file) => isImageFile(file))
              .map((file) => resolveProjectAssetSrc(projectId, file))
              .filter(Boolean);
            out.project = project;
            out.imageSources = [...new Set(imageSources)];
            return out;
          } catch (err) {
            console.warn(`Unable to resolve preview data for ${projectId}`, err);
            return out;
          }
        })();
        projectDataCache.set(projectId, promise);
        return promise;
      }

      function buildSnapshotModel(projectId, project) {
        const rawNodes = Array.isArray(project?.nodes) ? project.nodes : [];
        const rawEdges = Array.isArray(project?.edges) ? project.edges : [];
        const parsedDates = rawNodes.map((rawNode, index) => {
          const data = nodePayload(rawNode);
          return parseDateSafe(data.date) ?? index;
        });
        const minDate = parsedDates.length ? Math.min(...parsedDates) : 0;
        const maxDate = parsedDates.length ? Math.max(...parsedDates) : 1;
        const span = Math.max(1, maxDate - minDate);

        const nodes = rawNodes.map((rawNode, index) => {
          const data = nodePayload(rawNode);
          const id = String(rawNode?.id || data.id || `node-${index}`);
          const lane = areaLaneKey(data.areas, id);
          const laneX =
            lane === "speculative" ? -156 : lane === "communication" ? 0 : 156;
          const seed = hash(`${projectId}:${id}`);
          const angle = ((seed % 360) / 180) * Math.PI;
          const ring = 26 + ((seed >>> 8) % 84);
          const noiseX = (((seed >>> 19) % 100) / 100 - 0.5) * 42;
          const noiseZ = (((seed >>> 25) % 100) / 100 - 0.5) * 64;
          const when = parsedDates[index];
          const t = span ? (when - minDate) / span : 0.5;
          return {
            id,
            degree: 0,
            type: String(data.type || ""),
            x: laneX + Math.cos(angle) * ring * 0.92 + noiseX,
            y: 316 - t * 632 + (((seed >>> 14) % 100) / 100 - 0.5) * 24,
            z:
              Math.sin(angle) * ring * 1.28 +
              noiseZ +
              (((hash(data.type || id) >>> 6) % 100) / 100 - 0.5) * 56,
          };
        });

        const byId = new Map(nodes.map((node, index) => [node.id, index]));
        const edges = [];
        for (const rawEdge of rawEdges) {
          const a = byId.get(String(rawEdge?.s || ""));
          const b = byId.get(String(rawEdge?.t || ""));
          if (a == null || b == null || a === b) continue;
          edges.push({ a, b, dashed: !!rawEdge?.dashed });
          nodes[a].degree += 1;
          nodes[b].degree += 1;
        }

        for (const node of nodes) {
          node.radius = Math.max(3.2, Math.min(12.8, 3.8 + Math.sqrt(node.degree + 1) * 1.24));
        }

        return { nodes, edges };
      }

      function computeSnapshotBounds(nodes) {
        if (!nodes.length) {
          return { cx: 0, cy: 0, cz: 0, scale: 1, camera: 960 };
        }
        const xs = nodes.map((node) => node.x);
        const ys = nodes.map((node) => node.y);
        const zs = nodes.map((node) => node.z);
        const minX = Math.min(...xs);
        const maxX = Math.max(...xs);
        const minY = Math.min(...ys);
        const maxY = Math.max(...ys);
        const minZ = Math.min(...zs);
        const maxZ = Math.max(...zs);
        const span = Math.max(maxX - minX, maxY - minY, maxZ - minZ, 1);
        return {
          cx: (minX + maxX) * 0.5,
          cy: (minY + maxY) * 0.5,
          cz: (minZ + maxZ) * 0.5,
          scale: 2.05,
          camera: span * 3.8 + 720,
          depthMin: minZ,
          depthMax: maxZ,
        };
      }

      function projectSnapshotPoint(node, bounds, width, height) {
        const yaw = -0.72;
        const pitch = 0.58;
        const px = node.x - bounds.cx;
        const py = node.y - bounds.cy;
        const pz = node.z - bounds.cz;
        const cosY = Math.cos(yaw);
        const sinY = Math.sin(yaw);
        const cosP = Math.cos(pitch);
        const sinP = Math.sin(pitch);

        const x1 = px * cosY - pz * sinY;
        const z1 = px * sinY + pz * cosY;
        const y1 = py * cosP - z1 * sinP;
        const z2 = py * sinP + z1 * cosP;
        const perspective = bounds.camera / (bounds.camera - z2);

        return {
          x: width * 0.5 + x1 * bounds.scale * perspective,
          y: height * 0.54 + y1 * bounds.scale * perspective,
          z: z2,
          perspective,
        };
      }

      function drawSnapshotBackground(ctx, width, height, projectId) {
        ctx.clearRect(0, 0, width, height);
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, "#f7f7f7");
        gradient.addColorStop(1, "#ececec");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        const glow = ctx.createRadialGradient(
          width * 0.28,
          height * 0.16,
          0,
          width * 0.28,
          height * 0.16,
          width * 0.7,
        );
        glow.addColorStop(0, "rgba(0, 0, 0, 0.07)");
        glow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = "rgba(17, 17, 17, 0.12)";
        for (let i = 0; i < 56; i += 1) {
          const seed = hash(`${projectId}:star:${i}`);
          const x = ((seed % 1000) / 1000) * width;
          const y = ((((seed >>> 10) % 1000) / 1000) * height * 0.92) + height * 0.04;
          const size = 1 + (((seed >>> 20) % 100) / 100) * 2.2;
          ctx.beginPath();
          ctx.arc(x, y, size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function nodeFillColor(node) {
        const hue = hash(node.type || node.id) % 360;
        return `hsl(${hue} 10% 58%)`;
      }

      async function renderProjectSnapshot(projectId, project) {
        if (projectSnapshotCache.has(projectId)) {
          return projectSnapshotCache.get(projectId);
        }
        const promise = new Promise((resolve) => {
          const width = 1080;
          const height = 1440;
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext("2d");
          if (!ctx) {
            resolve("");
            return;
          }

          drawSnapshotBackground(ctx, width, height, projectId);
          const model = buildSnapshotModel(projectId, project);
          const bounds = computeSnapshotBounds(model.nodes);
          const projected = model.nodes.map((node) =>
            projectSnapshotPoint(node, bounds, width, height),
          );
          const depthMin = Math.min(...projected.map((point) => point.z), 0);
          const depthMax = Math.max(...projected.map((point) => point.z), 1);
          const depthSpan = Math.max(1, depthMax - depthMin);

          const orderedEdges = [...model.edges].sort((a, b) => {
            const da = (projected[a.a].z + projected[a.b].z) * 0.5;
            const db = (projected[b.a].z + projected[b.b].z) * 0.5;
            return da - db;
          });

          ctx.lineCap = "round";
          for (const edge of orderedEdges) {
            const a = projected[edge.a];
            const b = projected[edge.b];
            const depth = ((a.z + b.z) * 0.5 - depthMin) / depthSpan;
            ctx.setLineDash(edge.dashed ? [9, 8] : []);
            ctx.strokeStyle = `rgba(17, 17, 17, ${0.08 + depth * 0.2})`;
            ctx.lineWidth = 1 + ((a.perspective + b.perspective) * 0.5 - 0.6) * 1.25;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
          ctx.setLineDash([]);

          const orderedNodes = model.nodes
            .map((node, index) => ({ node, point: projected[index] }))
            .sort((a, b) => a.point.z - b.point.z);

          for (const entry of orderedNodes) {
            const depth = (entry.point.z - depthMin) / depthSpan;
            const radius = entry.node.radius * entry.point.perspective;
            ctx.beginPath();
            ctx.arc(entry.point.x, entry.point.y, radius, 0, Math.PI * 2);
            ctx.fillStyle = nodeFillColor(entry.node);
            ctx.shadowColor = "rgba(0, 0, 0, 0.12)";
            ctx.shadowBlur = 12 * entry.point.perspective;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.lineWidth = 1.2;
            ctx.strokeStyle = `rgba(17, 17, 17, ${0.18 + depth * 0.3})`;
            ctx.stroke();
          }

          canvas.toBlob(
            (blob) => {
              if (!blob) {
                resolve(canvas.toDataURL("image/jpeg", 0.88));
                return;
              }
              resolve(URL.createObjectURL(blob));
            },
            "image/jpeg",
            0.88,
          );
        });
        projectSnapshotCache.set(projectId, promise);
        return promise;
      }

      function renderProjectCard(project) {
        const editorHref = `./index.html?project=${encodeURIComponent(project.id)}`;
        const processHref = `./process.html?project=${encodeURIComponent(project.id)}`;
        const spaceHref = `./space.html?project=${encodeURIComponent(project.id)}`;
        return `
          <article class="project-card" data-project="${project.id}">
            <a class="project-preview" href="${spaceHref}" aria-label="Open ${project.displayName} in Space">
              <img class="project-still" alt="" loading="lazy" />
              <div class="project-hover-preview" aria-hidden="true">
                <img class="project-hover-image" alt="" loading="lazy" />
              </div>
              <div class="project-placeholder" aria-hidden="true"></div>
            </a>
            <div class="project-meta-panel">
              <h2 class="project-name">${project.displayName}</h2>
              <nav class="project-actions" aria-label="Open ${project.displayName}">
                <a class="project-action" href="${editorHref}" aria-label="Open ${project.displayName} in Editor" title="Open in Editor">
                  <span class="material-symbols-outlined">edit</span>
                </a>
                <a class="project-action" href="${processHref}" aria-label="Open ${project.displayName} in Process" title="Open in Process">
                  <span class="material-symbols-outlined">timeline</span>
                </a>
                <a class="project-action" href="${spaceHref}" aria-label="Open ${project.displayName} in Space" title="Open in Space">
                  <span class="material-symbols-outlined">view_in_ar</span>
                </a>
              </nav>
            </div>
          </article>`;
      }

      function markCardReady(card) {
        card.classList.remove("is-preview-missing");
        card.classList.add("is-still-ready");
      }

      function markCardMissing(card) {
        card.classList.remove("is-still-ready");
        card.classList.add("is-preview-missing");
      }

      async function attachSnapshotPreview(card, projectId) {
        const still = card.querySelector(".project-still");
        if (!still) return;

        still.addEventListener("load", () => {
          markCardReady(card);
        });
        still.addEventListener("error", () => {
          markCardMissing(card);
        });

        try {
          const data = await resolveProjectData(projectId);
          let snapshotSrc = "";
          if (data.project) {
            snapshotSrc = await renderProjectSnapshot(projectId, data.project);
          }
          if (!snapshotSrc) {
            snapshotSrc = data.imageSources[0] || "";
          }
          if (!snapshotSrc) {
            markCardMissing(card);
            return;
          }
          still.src = snapshotSrc;
        } catch (err) {
          console.warn(`Unable to attach snapshot for ${projectId}`, err);
          markCardMissing(card);
        }
      }

      function shufflePreviewImages(sources) {
        const queue = [...sources];
        for (let i = queue.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [queue[i], queue[j]] = [queue[j], queue[i]];
        }
        return queue;
      }

      function attachHoverPreview(card, projectId) {
        const hoverImg = card.querySelector(".project-hover-image");
        if (!hoverImg) return;

        let timer = 0;
        let token = 0;
        let queue = [];
        let index = -1;

        const stopHover = () => {
          token += 1;
          if (timer) {
            clearInterval(timer);
            timer = 0;
          }
          queue = [];
          index = -1;
          card.classList.remove("is-hover-active");
          hoverImg.removeAttribute("src");
        };

        const showNext = () => {
          if (!queue.length) return;
          index = (index + 1) % queue.length;
          hoverImg.src = queue[index];
        };

        const startHover = async () => {
          const currentToken = ++token;
          const assets = await resolveProjectData(projectId);
          if (currentToken !== token) return;
          if (!assets.imageSources.length) return;
          queue = shufflePreviewImages(assets.imageSources);
          if (!queue.length) return;
          card.classList.add("has-hover-images");
          card.classList.add("is-hover-active");
          showNext();
          if (timer) clearInterval(timer);
          timer = window.setInterval(showNext, 180);
        };

        card.addEventListener("mouseenter", () => {
          void startHover();
        });
        card.addEventListener("mouseleave", stopHover);
        card.addEventListener("focusin", () => {
          void startHover();
        });
        card.addEventListener("focusout", stopHover);
      }

      if (projectGrid) {
        projectGrid.innerHTML = PROJECTS.map(renderProjectCard).join("");
        projectGrid.querySelectorAll(".project-card").forEach((card) => {
          const projectId = card.getAttribute("data-project");
          if (projectId) {
            void attachSnapshotPreview(card, projectId);
            attachHoverPreview(card, projectId);
          }
        });
      }

      window.OvertraceUI?.attachToolbarTooltips(
        document.querySelector("header.ts-toolbar"),
      );
    </script>
  </body>
</html>
