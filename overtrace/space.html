<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Space Analysis - Overtrace</title>
    <meta
      name="description"
      content="Three-dimensional spatial analysis of an Overtrace project, with nodes, links, discipline networks and visual filters."
    />
    <meta name="application-name" content="Overtrace" />
    <meta name="apple-mobile-web-app-title" content="Overtrace" />
    <meta name="theme-color" content="#111111" />
    <meta name="robots" content="index,follow" />
    <meta property="og:site_name" content="Overtrace" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Space Analysis - Overtrace" />
    <meta
      property="og:description"
      content="Three-dimensional spatial analysis of an Overtrace project, with nodes, links, discipline networks and visual filters."
    />
    <meta
      property="og:image"
      content="./overtrace/android-chrome-512x512.png"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Space Analysis - Overtrace" />
    <meta
      name="twitter:description"
      content="Three-dimensional spatial analysis of an Overtrace project, with nodes, links, discipline networks and visual filters."
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./overtrace/logo.png?v=2"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="./overtrace/logo.png?v=2"
    />
    <link
      rel="shortcut icon"
      type="image/png"
      href="./overtrace/logo.png?v=2"
    />
    <link rel="apple-touch-icon" href="./overtrace/logo.png?v=2" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <style>
      :root {
        --bg: #ffffff;
        --panel: #ffffff;
        --ink: #111111;
        --muted: #6f6f6f;
        --line: rgba(0, 0, 0, 0.1);
        --btn-hover: rgba(0, 0, 0, 0.06);
        --btn-active: rgba(0, 0, 0, 0.1);
        --focus-ring: rgba(0, 0, 0, 0.24);
        --ok: #2f8f52;
        --warn: #a66a12;
        --space-side-gap: 14px;
        --space-side-rail-size: calc(
          var(--ts-control-size) + var(--ts-panel-padding) * 2
        );
        --space-side-rail-extra: 2px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font: 400 14px/1.4 var(--ot-font-sans);
        overflow: hidden;
      }

      .app {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .layout {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(420px, 50vw);
      }

      body.side-collapsed .layout {
        grid-template-columns:
          minmax(0, 1fr)
          calc(
            var(--space-side-rail-size) + var(--space-side-rail-extra) +
              var(--space-side-gap)
          );
      }

      #viewWrap {
        position: relative;
        min-width: 0;
        min-height: 0;
        border-right: none;
        user-select: none;
        -webkit-user-select: none;
      }

      #viewWrap.drop {
        outline: 2px dashed rgba(0, 0, 0, 0.25);
        outline-offset: -10px;
      }

      #view {
        width: 100%;
        height: 100%;
        display: block;
        background: #ffffff;
      }

      #labelsLayer {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
      }

      .node-label {
        position: absolute;
        transform: translate(-50%, -100%);
        transform-origin: top center;
        --assetH: 62px;
        width: 112px;
        max-width: 112px;
        border: none;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        padding: 4px;
        pointer-events: auto;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }

      .node-label * {
        user-select: none;
        -webkit-user-select: none;
      }

      .node-label.selected {
        opacity: 1;
      }

      .node-label.compact {
        max-width: 130px;
      }

      .node-label.compact .assets {
        display: none;
      }

      .node-label.faint {
        opacity: 0.56;
      }

      .node-label .title {
        font-size: 10px;
        font-weight: 700;
        font-family: "Times New Roman", Times, serif;
        line-height: 1.2;
        color: #111;
        word-break: break-word;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.75);
      }

      .node-label .assets {
        margin-top: 2px;
      }

      .node-label .assets img {
        display: block;
        width: 100%;
        max-height: var(--assetH);
        object-fit: cover;
        border-radius: 0;
        border: none;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-user-drag: none;
      }

      .node-label .assets .meta {
        font-size: 9px;
        font-family: "Times New Roman", Times, serif;
        line-height: 1.2;
        color: #444;
        word-break: break-word;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .node-label.selected .title {
        font-weight: 700;
      }

      .node-label.boxed {
        border: 2px solid var(--nodeBorder, #111111);
        border-radius: 2px;
        padding: 3px;
        background: #ffffff;
      }

      .node-label.dimmed {
        opacity: 0.24;
      }

      body.hide-images .node-label .assets {
        display: none !important;
      }

      body.hide-images #nodeMedia img {
        display: none !important;
      }

      body.hide-images #nodeOverlay3d img {
        display: none !important;
      }

      body.hide-text .node-label .title,
      body.hide-text .node-label .assets .meta {
        display: none !important;
      }

      #side {
        position: relative;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        background: #ffffff;
        border: 1px solid var(--ts-toolbar-border);
        border-radius: var(--ts-radius-panel);
        box-shadow: var(--ts-toolbar-panel-shadow);
        margin: calc(var(--ts-toolbar-safe-top) + 4px) var(--space-side-gap)
          var(--space-side-gap) 0;
        height: calc(100vh - var(--ts-toolbar-safe-top) - 18px);
        align-self: start;
        display: flex;
        flex-direction: column;
      }

      body.side-collapsed #side {
        overflow: hidden;
        padding-top: 0;
        width: calc(var(--space-side-rail-size) + var(--space-side-rail-extra));
        min-width: calc(
          var(--space-side-rail-size) + var(--space-side-rail-extra)
        );
        height: calc(
          var(--space-side-rail-size) + var(--space-side-rail-extra)
        );
        min-height: calc(
          var(--space-side-rail-size) + var(--space-side-rail-extra)
        );
      }

      #btnToggleSide {
        position: absolute;
        top: var(--ts-panel-padding);
        right: var(--ts-panel-padding);
        z-index: 2;
        appearance: none;
        -webkit-appearance: none;
        border: none;
        background: transparent;
        color: var(--ts-toolbar-fg);
        width: var(--ts-control-size);
        height: var(--ts-control-size);
        min-width: var(--ts-control-size);
        min-height: var(--ts-control-size);
        padding: 0;
        border-radius: var(--ts-radius-control);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition:
          background-color 120ms ease,
          opacity 120ms ease,
          transform 60ms ease;
      }

      #btnToggleSide:hover {
        background: var(--ts-toolbar-hover);
      }

      #btnToggleSide:active {
        background: var(--ts-toolbar-active);
      }

      #btnToggleSide:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--ts-toolbar-focus);
      }

      #btnToggleSide .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" var(--ts-toolbar-icon-weight),
          "opsz" 24;
        font-size: 20px;
        line-height: 1;
        display: block;
        pointer-events: none;
      }

      #sideContent {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      body.side-collapsed #sideContent {
        display: none;
      }

      #projectPane {
        padding: 12px 14px;
      }

      #disciplinePane {
        min-height: 0;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      #disciplineStats {
        display: none;
      }

      #disciplineWrap {
        position: relative;
        min-width: 0;
        width: 100%;
        min-height: 0;
        aspect-ratio: 1 / 1;
        height: auto;
        align-self: stretch;
        flex: 0 0 auto;
        border: none;
        border-radius: 0;
        overflow: hidden;
        background: #ffffff;
      }

      #disciplineView {
        width: 100%;
        height: 100%;
        display: block;
        background: #ffffff;
      }

      #disciplineHint {
        margin: 0;
        padding-left: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      #disciplineList {
        border: none;
        border-radius: 0;
        background: transparent;
        display: flex;
        flex-direction: column;
        overflow: visible;
        flex: 0 0 auto;
      }

      #disciplineListBody {
        display: flex;
        flex-direction: column;
      }

      #disciplineListHead,
      .discipline-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 56px 56px;
        gap: 8px;
        align-items: center;
        padding: 6px 8px;
        font-size: 12px;
        font-family: var(--ot-font-sans);
        font-weight: 400;
      }

      #disciplineListHead {
        position: static;
        background: #ffffff;
        color: var(--muted);
        border-bottom: 1px solid var(--line);
      }

      .discipline-row + .discipline-row {
        border-top: 1px solid rgba(0, 0, 0, 0.06);
      }

      .discipline-row .area {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #111;
      }

      .discipline-row .num {
        text-align: right;
      }

      #disciplineListEmpty {
        margin: 0;
        padding: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .discipline-legend {
        display: grid;
        gap: 6px;
      }

      .discipline-legend[hidden] {
        display: none !important;
      }

      .discipline-legend-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
        font-family: var(--ot-font-sans);
        font-weight: 400;
      }

      .discipline-legend-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        flex: 0 0 auto;
      }

      #viewFilters {
        margin-top: 2px;
        display: grid;
        gap: 6px;
      }

      #viewFilters .row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 8px;
      }

      .side-select {
        width: 100%;
        min-height: 30px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        padding: 5px 8px;
      }

      .side-select:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--focus-ring);
      }

      #viewFilterStats {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      #analysisDataPane {
        padding: 10px;
        border-bottom: 1px solid var(--line);
        display: grid;
        gap: 10px;
      }

      #analysisDataPane .chart-card {
        margin-top: 0;
      }

      #editorMapControls {
        margin-top: 8px;
        display: grid;
        gap: 8px;
      }

      #editorMapControls .row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 8px;
      }

      .side-btn {
        width: 100%;
        min-height: 30px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        padding: 5px 8px;
        cursor: pointer;
      }

      .side-btn:hover {
        background: var(--btn-hover);
      }

      .side-btn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--focus-ring);
      }

      #editorMapInfo {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .chart-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }

      .chart-head h3 {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        font-weight: 500;
      }

      .chart-meta {
        margin: 0;
        font-size: 11px;
        color: #7b7b7b;
      }

      #lineChartAnalysis,
      #totalsChartAnalysis,
      #miniMapAnalysis {
        width: 100%;
        display: block;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      #lineChartAnalysis {
        height: 196px;
      }

      #totalsChartAnalysis {
        margin-top: 8px;
        height: 118px;
      }

      #miniMapAnalysis {
        height: 240px;
        touch-action: none;
        cursor: grab;
      }

      #miniMapAnalysis.panning {
        cursor: grabbing;
      }

      #projectName {
        margin: 0;
        font-size: 12px;
        font-weight: 400;
        line-height: 1.2;
      }

      .card {
        margin-top: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
      }

      .card h3 {
        margin: 0 0 8px;
        font-size: 12px;
        color: var(--muted);
        font-weight: 500;
      }

      #colorEditor {
        display: grid;
        gap: 6px;
        max-height: min(34vh, 320px);
        overflow: auto;
        padding-right: 2px;
      }

      .color-row {
        display: grid;
        grid-template-columns: 26px 1fr auto;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }

      .color-row input[type="color"] {
        width: 24px;
        height: 24px;
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 0;
        background: transparent;
        cursor: pointer;
      }

      .color-row .name {
        color: #222;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .color-row .count {
        color: #777;
        font-variant-numeric: tabular-nums;
      }

      #colorPanelMeta {
        margin: 0 0 8px;
        color: #777;
        font-size: 12px;
      }

      #btnResetPalette {
        margin-top: 8px;
        width: 100%;
      }

      .kv {
        display: grid;
        grid-template-columns: 80px 1fr;
        gap: 6px;
        font-size: 12px;
      }

      .k {
        color: #777;
      }

      .desc {
        margin-top: 8px;
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.4;
      }

      #nodeMedia {
        margin-top: 8px;
        display: grid;
        gap: 8px;
      }

      #nodeMedia img {
        width: 100%;
        border-radius: 0;
        border: none;
      }

      #nodeMedia a {
        color: #17407b;
        font-size: 12px;
      }

      #nodeOverlay3d {
        position: absolute;
        top: calc(var(--ts-toolbar-safe-top) + 4px);
        right: 14px;
        z-index: 6;
        width: min(360px, calc(100% - 28px));
        max-height: calc(100% - var(--ts-toolbar-safe-top) - 18px);
        overflow: auto;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--ts-toolbar-border);
        border-radius: var(--ts-radius-panel);
        box-shadow: var(--ts-toolbar-panel-shadow);
        padding: 12px 14px 14px;
        pointer-events: auto;
        touch-action: pan-y;
        overscroll-behavior: contain;
      }

      #nodeOverlay3d.is-hidden {
        display: none;
      }

      #nodeOverlay3dHead {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      #nodeOverlay3dTitle {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.2;
      }

      #nodeOverlay3dMeta {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      #btnCloseNodeOverlay3d {
        border: none;
        background: transparent;
        color: #333;
        cursor: pointer;
        width: 28px;
        height: 28px;
        min-width: 28px;
        min-height: 28px;
        padding: 0;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      #btnCloseNodeOverlay3d:hover {
        background: rgba(0, 0, 0, 0.08);
      }

      #btnCloseNodeOverlay3d .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" var(--ts-toolbar-icon-weight),
          "opsz" 24;
        font-size: 18px;
        line-height: 1;
        display: block;
        pointer-events: none;
      }

      #nodeOverlay3dInfo {
        margin: 0;
        grid-template-columns: 110px 1fr;
        gap: 4px 8px;
      }

      #nodeOverlay3dDivider {
        height: 1px;
        margin: 6px 0;
        background: rgba(0, 0, 0, 0.14);
      }

      #nodeOverlay3dDesc {
        margin-top: 10px;
        margin-bottom: 0;
      }

      .node-overlay-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .node-overlay-badge {
        display: inline-block;
        border: none;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        background: #ececec;
        color: #111111;
      }

      .node-overlay-desc-title {
        font-size: 12px;
        color: #777;
        margin-bottom: 4px;
      }

      #nodeOverlay3dMedia {
        margin-top: 10px;
        display: grid;
        gap: 8px;
      }

      #nodeOverlay3dMedia img {
        width: 100%;
        border-radius: 10px;
        border: 1px solid rgba(0, 0, 0, 0.08);
      }

      #nodeOverlay3dMedia a {
        color: var(--ink);
        font-size: 12px;
        text-decoration: underline;
      }

      .ok,
      .warn {
        color: var(--muted) !important;
      }

      @media (max-width: 1000px) {
        .topbar {
          flex-wrap: wrap;
          align-items: center;
        }

        .nav-left {
          width: 100%;
          flex-wrap: wrap;
        }

        .nav-right {
          margin-left: auto;
        }

        #navStatus {
          max-width: 100%;
          padding-left: 0;
          flex: 1 1 220px;
        }

        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) minmax(320px, 44vh);
        }

        #viewWrap {
          border-bottom: 1px solid var(--line);
        }

        #side {
          margin: 0;
          height: auto;
          border-radius: 0;
          border-left: none;
          border-right: none;
          border-bottom: none;
          box-shadow: none;
        }
      }

      body.mobile-space .nav-right,
      body.mobile-space #side {
        display: none;
      }

      body.mobile-space .topbar.ts-toolbar {
        grid-template-columns: auto minmax(0, 1fr);
        gap: 10px;
      }

      body.mobile-space .nav-left {
        width: calc(var(--ts-brand-size) + var(--ts-panel-padding) * 2);
        min-width: calc(var(--ts-brand-size) + var(--ts-panel-padding) * 2);
        flex-wrap: nowrap;
      }

      body.mobile-space .nav-center {
        justify-self: end;
        width: max-content;
        max-width: calc(100vw - 84px);
        overflow-x: auto;
        scrollbar-width: none;
      }

      body.mobile-space .nav-center::-webkit-scrollbar {
        display: none;
      }

      body.mobile-space #navStatus,
      body.mobile-space #btnOpen,
      body.mobile-space #btnPreviewLoop {
        display: none;
      }

      body.mobile-space .layout {
        display: block;
        height: 100dvh;
      }

      body.mobile-space,
      body.mobile-space .app {
        height: 100dvh;
        --ts-toolbar-safe-top: 62px;
      }

      body.mobile-space #viewWrap {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
        border-right: none;
        border-bottom: none;
        touch-action: none;
        overscroll-behavior: none;
      }

      body.mobile-space #view,
      body.mobile-space #labelsLayer,
      body.mobile-space .node-label {
        touch-action: none;
      }

      body.mobile-space #nodeOverlay3d {
        top: calc(var(--ts-toolbar-safe-top) + 2px);
        right: 10px;
        width: calc(100% - 20px);
        max-width: 420px;
        max-height: calc(100% - var(--ts-toolbar-safe-top) - 12px);
      }
    </style>
    <link rel="stylesheet" href="./typography.css" />
    <link rel="stylesheet" href="./shared-ui.css" />
    <script src="./shared-ui.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar ts-toolbar">
        <div class="nav-left">
          <a
            class="toolbar-brand"
            href="./index.html"
            aria-label="Open Project Atlas"
          >
            <img
              class="brand-logo"
              src="./overtrace/logo.svg"
              alt=""
              width="36"
              height="36"
            />
            <span class="brand-wordmark">Overtrace</span>
          </a>
        </div>
        <div class="nav-center">
          <button
            id="btnOpen"
            class="icon-btn"
            type="button"
            aria-label="Open project (⌘O)"
            data-tip="Open project (⌘O)"
          >
            <span class="material-symbols-outlined">file_open</span>
          </button>
          <button
            id="btnReset"
            class="icon-btn"
            type="button"
            aria-label="Reset camera"
            data-tip="Reset camera"
          >

        function esc(text) {
          return String(text ?? "").replace(/[&<>"']/g, (char) => {
            const map = {
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",

        function setIdleStatus(message) {

        function setHint(message, level) {

          }

        function syncPreviewSnapshotButton() {
          if (!dom.btnPreviewLoop) return;
          const busy = !!state.previewCapture.active;
          const enabled = !!state.nodes.length && !state.overviewMode;
          dom.btnPreviewLoop.disabled = busy || !enabled;
          dom.btnPreviewLoop.classList.toggle("is-active", busy);
          dom.btnPreviewLoop.dataset.tip = busy
            ? "Saving screenshot"
            : "Screenshot";
          dom.btnPreviewLoop.setAttribute(

          );
        }

        function getNodeLabelProjection(node, width, height) {
          if (!node?.labelEl || node.visibleByFilter === false) return null;
          const projected = node.pos.clone().project(camera);
          if (projected.z < -1 || projected.z > 1) return null;
          const x = (projected.x * 0.5 + 0.5) * width;
          const y = (-projected.y * 0.5 + 0.5) * height;
          const projectedOffset = node.pos
            .clone()
            .add(new THREE.Vector3(node.radius * 5.6, 0, 0))
            .project(camera);
          const pxRadius = Math.abs(
            (projectedOffset.x - projected.x) * width * 0.5,
          );
          const baseScale = pxRadius / 13.5;
          const isSelected =
            state.selected >= 0 && state.nodes[state.selected] === node;
          const scale = THREE.MathUtils.clamp(
            baseScale,
            isSelected ? 0.62 : 0.44,
            isSelected ? 2.85 : 2.35,
          );
          return { x, y, scale };
        }

        function ellipsizeSnapshotText(ctx, text, maxWidth) {
          const value = String(text || "")
            .replace(/\s+/g, " ")
            .trim();
          if (!value) return "";
          if (ctx.measureText(value).width <= maxWidth) return value;
          let out = value;
          while (out.length > 1) {
            out = out.slice(0, -1).trimEnd();
            if (ctx.measureText(`${out}...`).width <= maxWidth) {
              return `${out}...`;
            }
          }
          return "...";
        }

        function drawSnapshotImageCover(ctx, image, dx, dy, dWidth, dHeight) {
          const sw = image.naturalWidth || image.videoWidth || image.width || 0;
          const sh =
            image.naturalHeight || image.videoHeight || image.height || 0;
          if (!sw || !sh) return false;
          const scale = Math.max(dWidth / sw, dHeight / sh);
          const sWidth = dWidth / scale;
          const sHeight = dHeight / scale;
          const sx = (sw - sWidth) * 0.5;
          const sy = (sh - sHeight) * 0.5;
          ctx.drawImage(
            image,
            sx,
            sy,
            sWidth,
            sHeight,
            dx,
            dy,
            dWidth,
            dHeight,
          );
          return true;
        }

        function drawNodeLabelSnapshot(ctx, node, width, height) {
          const projection = getNodeLabelProjection(node, width, height);
          if (!projection) return;

          const labelWidth = Math.max(
            92,
            Math.round(parseFloat(node.labelEl?.style.width || "") || 120),
          );
          const assetHeight = Math.max(
            44,
            Math.round(
              parseFloat(
                node.labelEl?.style.getPropertyValue("--assetH") || "",
              ) || 56,
            ),
          );
          const imageEl = state.showImages
            ? node.labelAssetsEl?.querySelector("img")
            : null;
          const hasImage = !!(
            imageEl &&
            imageEl.complete &&
            imageEl.naturalWidth &&
            imageEl.naturalHeight
          );
          const metaLines = [];
          if (
            state.showText &&
            !hasImage &&
            Array.isArray(node.files) &&
            node.files.length
          ) {
            const first = node.files[0];
            metaLines.push(first?.name || first?.path || "asset");
          }
          if (
            state.showText &&
            Array.isArray(node.files) &&
            node.files.length > 1
          ) {
            metaLines.push(`+${node.files.length - 1} asset`);
          }

          const pad = 3;
          const titleLineHeight = state.showText ? 12 : 0;
          const metaLineHeight = 11;
          const contentWidth = labelWidth - pad * 2;
          const boxHeight =
            pad * 2 +
            titleLineHeight +
            (hasImage ? assetHeight + 2 : 0) +
            metaLines.length * metaLineHeight;
          const boxX = projection.x - labelWidth * projection.scale * 0.5;
          const boxY = projection.y - boxHeight * projection.scale;
          const showBorder =
            node.labelEl?.classList.contains("boxed") ||
            node.labelEl?.classList.contains("selected");

          ctx.save();
          if (node.labelEl?.classList.contains("dimmed")) {
            ctx.globalAlpha = 0.24;
          } else if (node.labelEl?.classList.contains("faint")) {
            ctx.globalAlpha = 0.56;
          }
          ctx.translate(boxX, boxY);
          ctx.scale(projection.scale, projection.scale);

          ctx.fillStyle = "rgba(255, 255, 255, 0.78)";
          ctx.fillRect(0, 0, labelWidth, boxHeight);

          if (showBorder) {
            ctx.strokeStyle =
              node.labelEl?.style.getPropertyValue("--nodeBorder").trim() ||
              "#111111";
            ctx.lineWidth = 5;
            ctx.strokeRect(0, 0, labelWidth, boxHeight);
          }

          let cursorY = pad;
          if (state.showText) {
            ctx.font = '700 10px "Times New Roman", Times, serif';
            ctx.fillStyle = "#111111";
            ctx.textBaseline = "top";
            ctx.fillText(
              ellipsizeSnapshotText(ctx, node.title || "Node", contentWidth),
              pad,
              cursorY,
            );
            cursorY += titleLineHeight;
          }

          if (hasImage) {
            drawSnapshotImageCover(
              ctx,
              imageEl,
              pad,
              cursorY,
              contentWidth,
              assetHeight,
            );
            cursorY += assetHeight + 2;
          }

          if (metaLines.length) {
            ctx.font = '9px "Times New Roman", Times, serif';
            ctx.fillStyle = "#444444";
            for (const line of metaLines) {
              ctx.fillText(
                ellipsizeSnapshotText(ctx, line, contentWidth),
                pad,
                cursorY,
              );
              cursorY += metaLineHeight;
            }
          }

          ctx.restore();
        }

        function drawPreviewSnapshotComposite(ctx, width, height) {
          ctx.clearRect(0, 0, width, height);
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, width, height);
          ctx.drawImage(renderer.domElement, 0, 0, width, height);
          for (const node of state.nodes) {
            drawNodeLabelSnapshot(ctx, node, width, height);
          }
        }

        async function waitForPreviewAssets(timeoutMs = 2400) {
          const images = Array.from(
            dom.labelsLayer?.querySelectorAll("img") || [],
          ).filter((img) => !!img.getAttribute("src"));
          if (!images.length) return;
          await Promise.race([
            Promise.all(
              images.map((img) => {
                if (img.complete) return Promise.resolve();
                return new Promise((resolve) => {
                  const done = () => {
                    img.removeEventListener("load", done);
                    img.removeEventListener("error", done);
                    resolve();
                  };
                  img.addEventListener("load", done, { once: true });
                  img.addEventListener("error", done, { once: true });
                });
              }),
            ),
            new Promise((resolve) => window.setTimeout(resolve, timeoutMs)),
          ]);
        }

        async function renderPreviewSnapshotCanvas() {
          const overlayWasVisible =
            !!dom.nodeOverlay3d &&
            !dom.nodeOverlay3d.classList.contains("is-hidden");
          const prev = {
            aspect: camera.aspect,
            pixelRatio: renderer.getPixelRatio(),
            size: renderer.getSize(new THREE.Vector2()),
          };

          try {
            if (document.fonts?.ready) {
              await document.fonts.ready.catch(() => {});
            }
            await waitForPreviewAssets();
            hideNodeOverlay3d();
            renderer.setPixelRatio(1);
            renderer.setSize(
              PREVIEW_CAPTURE_WIDTH,
              PREVIEW_CAPTURE_HEIGHT,
              false,
            );
            camera.aspect = PREVIEW_CAPTURE_WIDTH / PREVIEW_CAPTURE_HEIGHT;
            camera.updateProjectionMatrix();
            updateCameraFromControls(1);
            updateEdgeArrowRotationOnly();
            updateAllNodeLabelPositions();
            renderer.render(scene, camera);

            const canvas = document.createElement("canvas");
            canvas.width = PREVIEW_CAPTURE_WIDTH;
            canvas.height = PREVIEW_CAPTURE_HEIGHT;
            const ctx = canvas.getContext("2d");
            if (!ctx) throw new Error("Snapshot non supportata nel browser.");
            drawPreviewSnapshotComposite(
              ctx,
              PREVIEW_CAPTURE_WIDTH,
              PREVIEW_CAPTURE_HEIGHT,
            );
            return canvas;
          } finally {
            renderer.setPixelRatio(prev.pixelRatio);
            renderer.setSize(prev.size.x, prev.size.y, false);
            camera.aspect = prev.aspect;
            camera.updateProjectionMatrix();
            updateCameraFromControls(1);
            updateEdgeArrowRotationOnly();
            updateAllNodeLabelPositions();
            renderer.render(scene, camera);
            if (overlayWasVisible && state.selected >= 0) {
              renderNodeOverlay3d(state.nodes[state.selected]);
            }
          }
        }

        async function savePreviewSnapshotBlob(blob) {
          const fileName = "preview.jpg";
          const writeToFolderHandle = async (dirHandle) => {
            const fileHandle = await dirHandle.getFileHandle(fileName, {
              create: true,
            });
            const writable = await fileHandle.createWritable();
            await writable.write(blob);
            await writable.close();
            return { persisted: true, fileName };
          };

          try {
            const fsContext =
              await window.OvertraceUI?.loadProjectFsContext?.();
            if (fsContext?.kind === "folder" && fsContext.handle) {
              return await writeToFolderHandle(fsContext.handle);
            }
          } catch (err) {
            console.warn("Unable to persist preview snapshot", err);
          }

          try {
            if ("showDirectoryPicker" in window) {
              const dirHandle = await window.showDirectoryPicker({
                mode: "readwrite",
              });
              if (dirHandle) {
                return await writeToFolderHandle(dirHandle);
              }
            }
          } catch (err) {
            if (!err || err.name !== "AbortError") {
              console.warn(
                "Unable to persist preview snapshot via picker",
                err,
              );
            }
          }

          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = fileName;
          document.body.appendChild(link);
          link.click();
          link.remove();
          window.setTimeout(() => URL.revokeObjectURL(url), 1000);
          return { persisted: false, fileName };
        }

        async function savePreviewSnapshot() {
          if (state.previewCapture.active) return;
          if (!state.nodes.length) {
            setHint("Open a project first.", "warn");
            return;
          }
          if (state.overviewMode) {
            setHint("Preview is available only for single projects.", "warn");
            return;
          }

          state.previewCapture.active = true;
          syncPreviewSnapshotButton();
          try {
            const canvas = await renderPreviewSnapshotCanvas();

            const blob = await new Promise((resolve, reject) => {
              canvas.toBlob(
                (out) => {
                  if (out) resolve(out);
                  else reject(new Error("Snapshot failed."));
                },
                "image/jpeg",
                0.9,
              );
            });
            const result = await savePreviewSnapshotBlob(blob);
            setHint(
              result.persisted
                ? "Preview snapshot saved in the project."
                : "Preview snapshot downloaded.",
              "ok",
            );
          } catch (err) {
            console.warn("Preview snapshot failed", err);
            setHint(`Snapshot error: ${err?.message || err}`, "warn");
          } finally {
            state.previewCapture.active = false;
            syncPreviewSnapshotButton();
          }
        }

        async function postAtlasSnapshotToParent() {
          if (
            !ATLAS_SNAPSHOT_MODE ||
            state.overviewMode ||
            !state.nodes.length
          ) {
            return;
          }
          try {
            const canvas = await renderPreviewSnapshotCanvas();
            const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
            window.parent?.postMessage(
              {
                type: "overtrace-space-snapshot",
                project: QUERY_PARAMS.get("project") || state.folderName || "",
                dataUrl,
              },
              "*",
            );
          } catch (err) {
            console.warn("Unable to post atlas snapshot", err);
            window.parent?.postMessage(
              {
                type: "overtrace-space-snapshot",
                project: QUERY_PARAMS.get("project") || state.folderName || "",
                dataUrl: "",
              },
              "*",
            );
          }
        }

        function setRawProject(project) {
          if (!project) {
            state.rawProject = null;
            return;
          }
          try {
            state.rawProject = structuredClone(project);
          } catch (_) {
            state.rawProject = JSON.parse(JSON.stringify(project));
          }
        }

        function inferFolderNameFromBase(base) {
          const text = String(base || "")
            .trim()
            .replace(/\/+$/, "");
          if (!text) return null;
          if (text.includes("/")) return text.split("/").pop() || null;
          return text || null;
        }

        function persistSharedProjectState(source = "space") {
          if (!state.rawProject) return false;
          const folderName =
            state.folderName || inferFolderNameFromBase(state.assetBase);
          const payload = {
            version: 1,
            source,
            savedAt: Date.now(),
            folderName: folderName || null,
            assetBase: state.assetBase || "",
            label: state.projectName || "",
            project: state.rawProject,
          };
          localStorage.setItem(SHARED_PROJECT_KEY, JSON.stringify(payload));
          return true;
        }

        async function restoreSharedProjectFromRoute() {
          const params = new URLSearchParams(window.location.search);
          const from = params.get("from");
          if (!from || from === "space") return false;
          try {
            const raw = localStorage.getItem(SHARED_PROJECT_KEY);
            if (!raw) return false;
            const payload = JSON.parse(raw);
            if (!payload || !payload.project) return false;
            if (payload.source && payload.source !== from) return false;

            buildGraph(
              payload.project,
              payload.label || payload.folderName || "Project",
            );
            setRawProject(payload.project);
            state.folderName = payload.folderName || null;
            state.assetBase =
              payload.assetBase ||
              (payload.folderName ? `${payload.folderName}/` : "");
            if (!state.assetBase) {
              state.assetBase = await detectAssetBase(payload.project);
            }
            updateAllNodeLabelAssets();
            refreshToolbarOptions();
            applyImagesVisibility();

            params.delete("from");
            const qs = params.toString();
            const clean = `${window.location.pathname}${qs ? `?${qs}` : ""}`;
            window.history.replaceState({}, "", clean);
            return true;
          } catch (err) {
            console.warn("Shared-state restore failed", err);
            setHint("Restore from another view failed.", "warn");
            return false;
          }
        }

        function updateNodeLabelAssets(node) {
          if (!node.labelAssetsEl) return;
          node.labelAssetsEl.innerHTML = "";
          if (!Array.isArray(node.files) || node.files.length === 0) return;

          const firstImage =
            state.showImages && node.files.find((f) => !!f && f.isImage);
          if (firstImage && state.showImages) {
            const url = resolveAssetUrl(firstImage);
            if (url) {
              const img = document.createElement("img");
              img.src = url;
              img.alt = firstImage.name || "asset";
              img.loading = "lazy";
              img.draggable = false;
              node.labelAssetsEl.appendChild(img);
            }
          }

          if (!state.showText) return;

          if (node.labelAssetsEl.children.length === 0) {
            const first = node.files[0];
            const meta = document.createElement("div");
            meta.className = "meta";
            if (!state.showImages && node.files.some((f) => f && f.isImage)) {
              meta.textContent = "images off";
            } else {
              meta.textContent = first?.name || first?.path || "asset";
            }
            node.labelAssetsEl.appendChild(meta);
          }

          if (node.files.length > 1) {
            const more = document.createElement("div");
            more.className = "meta";
            more.textContent = `+${node.files.length - 1} asset`;
            node.labelAssetsEl.appendChild(more);
          }
        }

        function updateNodeLabelPosition(node) {
          if (!node.labelEl) return;
          if (node.visibleByFilter === false) {
            node.labelEl.style.display = "none";
            return;
          }
          const projected = node.pos.clone().project(camera);
          if (projected.z < -1 || projected.z > 1) {
            node.labelEl.style.display = "none";
            return;
          }

          const width = dom.viewWrap.clientWidth;
          const height = dom.viewWrap.clientHeight;
          const x = (projected.x * 0.5 + 0.5) * width;
          const y = (-projected.y * 0.5 + 0.5) * height;
          const dist = camera.position.distanceTo(node.pos);
          const isSelected =
            state.selected >= 0 && state.nodes[state.selected] === node;
          const projectedOffset = node.pos
            .clone()
            .add(new THREE.Vector3(node.radius * 5.6, 0, 0))
            .project(camera);
          const pxRadius = Math.abs(
            (projectedOffset.x - projected.x) * width * 0.5,
          );
          const baseScale = pxRadius / 13.5;
          const scale = THREE.MathUtils.clamp(
            baseScale,
            isSelected ? 0.62 : 0.44,
            isSelected ? 2.85 : 2.35,
          );

          node.labelEl.style.display = "block";
          node.labelEl.classList.remove("compact");
          node.labelEl.classList.remove("faint");
          node.labelEl.style.zIndex = String(
            Math.max(1, 2000 - Math.floor(dist)),
          );
          node.labelEl.style.transform = `translate(${x}px, ${y}px) translate(-50%, -100%) scale(${scale})`;
        }

        function updateAllNodeLabelAssets() {
          for (const node of state.nodes) updateNodeLabelAssets(node);
        }

        function updateAllNodeLabelPositions() {
          for (const node of state.nodes) updateNodeLabelPosition(node);
        }

        function hash(s) {
          let h = 2166136261;
          for (let i = 0; i < s.length; i++) {
            h ^= s.charCodeAt(i);
            h = Math.imul(h, 16777619);
          }
          return h >>> 0;
        }

        function parseDateSafe(value) {
          if (!value) return null;
          const t = Date.parse(String(value));
          return Number.isFinite(t) ? t : null;
        }

        function areaLaneKey(areas, fallbackId) {
          const scores = {
            speculative: 0,
            communication: 0,
            interaction: 0,
          };
          const list = Array.isArray(areas) ? areas : [areas];
          for (const area of list) {
            const txt = String(area || "").toLowerCase();
            if (!txt) continue;
            if (txt.includes("specul")) scores.speculative += 1;
            if (txt.includes("comunic") || txt.includes("communicat"))
              scores.communication += 1;
            if (txt.includes("inter")) scores.interaction += 1;
          }
          const best = Object.entries(scores).sort((a, b) => b[1] - a[1])[0];
          if (best && best[1] > 0) return best[0];
          const h = hash(`${fallbackId}_lane`) % 3;
          if (h === 0) return "speculative";
          if (h === 1) return "communication";
          return "interaction";
        }

        function normValue(value, fallback = "-") {
          const out = String(value ?? "")
            .replace(/\s+/g, " ")
            .trim();
          return out || fallback;
        }

        function nodePayload(rawNode) {
          if (!rawNode || typeof rawNode !== "object") return {};
          if (rawNode.data && typeof rawNode.data === "object")
            return rawNode.data;
          return rawNode;
        }

        function macroLabel(value) {
          if (value === "speculative") return "speculative";
          if (value === "communication") return "communication";
          if (value === "interaction") return "interaction";
          return normValue(value);
        }

        function modeLabel(mode) {
          if (mode === "type") return "type";
          if (mode === "action") return "action";
          if (mode === "macro") return "macro area";
          if (mode === "areas") return "areas";
          if (mode === "tags") return "tags";
          return "none";
        }

        function colorByCategory(mode, value) {
          if (mode === "macro") {
            if (value === "speculative") return new THREE.Color("#f08b3d");
            if (value === "communication") return new THREE.Color("#1f7dd3");
            if (value === "interaction") return new THREE.Color("#2f935c");
          }
          const h = (hash(`${mode}:${value}`) % 360) / 360;
          return new THREE.Color().setHSL(h, 0.62, 0.48);
        }

        function defaultColorHex(mode, value) {
          if (mode === "action") {
            const normalized = normValue(value, "").toLowerCase();
            if (normalized === "exploring") return "#28F7F7";
            if (normalized === "making") return "#572F10";
            return "#d2d2d2";
          }
          return `#${colorByCategory(mode, value).getHexString()}`;
        }

        function paletteForMode(mode) {
          if (!state.paletteByMode[mode]) state.paletteByMode[mode] = new Map();
          return state.paletteByMode[mode];
        }

        function colorHexFor(mode, value) {
          if (mode === "action") return defaultColorHex(mode, value);
          const map = paletteForMode(mode);
          if (!map.has(value)) map.set(value, defaultColorHex(mode, value));
          return map.get(value);
        }

        function resetPaletteForMode(mode) {
          state.paletteByMode[mode] = new Map();
        }

        function nodeValuesForMode(node, mode) {
          if (mode === "type") return [normValue(node.type)];
          if (mode === "action") return [normValue(node.action)];
          if (mode === "macro") return [areaLaneKey(node.areas, node.id)];
          if (mode === "areas") {
            return [
              ...new Set(
                (node.areas || []).map((v) => normValue(v)).filter(Boolean),
              ),
            ];
          }
          if (mode === "tags") {
            return [
              ...new Set(
                (node.tags || []).map((v) => normValue(v)).filter(Boolean),
              ),
            ];
          }
          return [];
        }

        function collectModeStats(mode) {
          const stats = new Map();
          for (const node of state.nodes) {
            const values = nodeValuesForMode(node, mode);
            for (const value of values) {
              stats.set(value, (stats.get(value) || 0) + 1);
            }
          }
          state.modeStats[mode] = stats;
          return stats;
        }

        function categoryLabel(mode, value) {
          if (mode === "macro") return macroLabel(value);
          return normValue(value);
        }

        function pickPrimaryNodeValue(values, stats) {
          if (!values.length) return "";
          if (values.length === 1) return values[0];
          const sorted = [...values].sort((a, b) => {
            const ca = stats.get(a) || 0;
            const cb = stats.get(b) || 0;
            if (ca !== cb) return cb - ca;
            return a.localeCompare(b, "it");
          });
          return sorted[0];
        }

        function updateHighlightValueOptions() {
          return;
        }

        function activeColorMode() {
          return state.actionOutlineEnabled ? "action" : "none";
        }

        function syncToolbarToggleButtons() {
          if (dom.btnToggleImages) {
            const icon = dom.btnToggleImages.querySelector(
              ".material-symbols-outlined",
            );
            const tip = state.showImages ? "Hide images" : "Images";
            if (icon)
              icon.textContent = state.showImages ? "hide_image" : "image";
            dom.btnToggleImages.setAttribute("data-tip", tip);
            dom.btnToggleImages.setAttribute("aria-label", tip);
            dom.btnToggleImages.disabled = !!state.overviewMode;
          }
          if (dom.btnToggleText) {
            const icon = dom.btnToggleText.querySelector(
              ".material-symbols-outlined",
            );
            const tip = state.showText ? "Hide text" : "Text";
            if (icon)
              icon.textContent = state.showText ? "text_ad_off" : "text_ad";
            dom.btnToggleText.setAttribute("data-tip", tip);
            dom.btnToggleText.setAttribute("aria-label", tip);
          }
          if (dom.btnToggleFilter) {
            const icon = dom.btnToggleFilter.querySelector(
              ".material-symbols-outlined",
            );
            const tip = state.actionOutlineEnabled
              ? "Action outline off"
              : "Action outline";
            if (icon) {
              icon.textContent = state.actionOutlineEnabled
                ? "filter_alt_off"
                : "filter_alt";
            }
            dom.btnToggleFilter.setAttribute("data-tip", tip);
            dom.btnToggleFilter.setAttribute("aria-label", tip);
          }
          if (dom.disciplineLegend) {
            const showLegend = !!state.actionOutlineEnabled;
            dom.disciplineLegend.hidden = !showLegend;
            dom.disciplineLegend.style.display = showLegend ? "grid" : "none";
          }
        }

        function syncSideCollapseButton() {
          if (!dom.btnToggleSide) return;
          document.body.classList.toggle(
            "side-collapsed",
            !!state.sideCollapsed,
          );
          const icon = dom.btnToggleSide.querySelector(
            ".material-symbols-outlined",
          );
          const label = state.sideCollapsed
            ? "Expand sidebar"
            : "Collapse sidebar";
          if (icon) {
            icon.textContent = state.sideCollapsed
              ? "dock_to_right"
              : "dock_to_left";
          }
          dom.btnToggleSide.setAttribute("aria-label", label);
          dom.btnToggleSide.setAttribute("data-tip", label);
          dom.btnToggleSide.setAttribute(
            "aria-expanded",
            state.sideCollapsed ? "false" : "true",
          );
        }

        function nodeValuesForViewMode(node, mode) {
          if (
            mode === "type" ||
            mode === "action" ||
            mode === "areas" ||
            mode === "tags"
          ) {
            return nodeValuesForMode(node, mode);
          }
          return [];
        }

        function collectViewFilterStats(mode) {
          const stats = new Map();
          for (const node of state.nodes) {
            const values = nodeValuesForViewMode(node, mode);
            if (!values.length) continue;
            for (const value of values) {
              stats.set(value, (stats.get(value) || 0) + 1);
            }
          }
          return stats;
        }

        function updateViewFilterValueOptions() {
          if (!dom.selViewMode || !dom.selViewValue) return;
          const mode = dom.selViewMode.value || "all";
          const previous = dom.selViewValue.value || "__all__";
          const options = [{ value: "__all__", label: "Value: all" }];

          if (mode !== "all") {
            const stats = collectViewFilterStats(mode);
            const sorted = [...stats.entries()].sort((a, b) => {
              if (a[1] !== b[1]) return b[1] - a[1];
              return a[0].localeCompare(b[0], "it");
            });
            for (const [value, count] of sorted) {
              options.push({
                value,
                label: `${categoryLabel(mode, value)} (${count})`,
              });
            }
          }

          dom.selViewValue.innerHTML = options
            .map(
              (o) => `<option value="${esc(o.value)}">${esc(o.label)}</option>`,
            )
            .join("");
          dom.selViewValue.value = options.some((o) => o.value === previous)
            ? previous
            : "__all__";
        }

        function nodeMatchesViewFilter(node, mode, value) {
          if (mode === "all" || value === "__all__") return true;
          const values = nodeValuesForViewMode(node, mode);
          return values.includes(value);
        }

        function countVisibleNodes() {
          let count = 0;
          for (const node of state.nodes) {
            if (node.visibleByFilter !== false) count += 1;
          }
          return count;
        }

        function countVisibleEdges() {
          let count = 0;
          for (const edge of state.edges) {
            const a = state.nodes[edge.a];
            const b = state.nodes[edge.b];
            if (!a || !b) continue;
            if (a.visibleByFilter === false || b.visibleByFilter === false)
              continue;
            count += 1;
          }
          return count;
        }

        function refreshViewFilterStats() {
          if (!dom.viewFilterStats) return;
          const visibleNodes = countVisibleNodes();
          const visibleEdges = countVisibleEdges();
          dom.viewFilterStats.textContent = `Visible ${visibleNodes}/${state.nodes.length} nodes · ${visibleEdges}/${state.edges.length} edges`;
        }

        function applyViewFilter() {
          const mode = dom.selViewMode?.value || "all";
          const value = dom.selViewValue?.value || "__all__";
          state.viewMode = mode;
          state.viewValue = value;

          for (const node of state.nodes) {
            const visible = nodeMatchesViewFilter(node, mode, value);
            node.visibleByFilter = visible;
            node.mesh.visible = visible;
            if (!visible) {
              node.labelEl?.classList.remove("selected");
              node.material.emissive.setHex(0x000000);
              node.material.emissiveIntensity = 0;
              node.mesh.scale.setScalar(node.radius);
            }
          }

          if (
            state.selected >= 0 &&
            state.nodes[state.selected] &&
            state.nodes[state.selected].visibleByFilter === false
          ) {
            selectNode(-1);
          }

          updateEdges();
          updateAllNodeLabelPositions();
          applyNodeHighlighting();
          refreshProjectInfo();
          refreshViewFilterStats();
          state.dataViewsDirty = true;
          renderAnalysisDataViews();
        }

        function prepCanvas2D(canvas) {
          if (!canvas) return null;
          const rect = canvas.getBoundingClientRect();
          if (!rect.width || !rect.height) return null;
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = Math.floor(rect.width * dpr);
          canvas.height = Math.floor(rect.height * dpr);
          const ctx = canvas.getContext("2d");
          if (!ctx) return null;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          return { ctx, width: rect.width, height: rect.height };
        }

        function drawChartPlaceholder(ctx, width, height, text) {
          ctx.clearRect(0, 0, width, height);
          ctx.fillStyle = "#f8f8f8";
          ctx.fillRect(0, 0, width, height);
          ctx.strokeStyle = "rgba(0,0,0,0.08)";
          ctx.strokeRect(0.5, 0.5, width - 1, height - 1);
          ctx.fillStyle = "#7b7b7b";
          ctx.font =
            '12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(text, width * 0.5, height * 0.5);
        }

        function analysisNodeById(id) {
          const index = state.nodeIndexById.get(String(id));
          if (index == null) return null;
          return state.nodes[index] || null;
        }

        function mapColorModeValue() {
          return dom.selMapColorMode?.value || activeColorMode();
        }

        function mapNodeGrayFill(mode, value) {
          const seed = `${mode}:${value}`;
          const t = (hash(seed) % 1000) / 999;
          const lightness = 60 * (1 - t);
          return `hsl(0 0% ${lightness.toFixed(1)}%)`;
        }

        function mapNodeColorHex(editorNode, mode, stats) {
          if (mode === "none") return "hsl(0 0% 36%)";
          const node = analysisNodeById(editorNode.id);
          if (!node) return "hsl(0 0% 36%)";
          const values = nodeValuesForMode(node, mode);
          const chosen = pickPrimaryNodeValue(values, stats);
          if (!chosen) return "hsl(0 0% 36%)";
          return mapNodeGrayFill(mode, chosen);
        }

        function buildEditorMiniMap(rawNodes, rawEdges) {
          const nodes = (Array.isArray(rawNodes) ? rawNodes : []).map(
            (raw, i) => {
              const w = Number.isFinite(Number(raw?.w)) ? Number(raw.w) : 320;
              const h = Number.isFinite(Number(raw?.h)) ? Number(raw.h) : 180;
              const fallbackX = (i % 6) * (w + 120);
              const fallbackY = Math.floor(i / 6) * (h + 64);
              const x = Number.isFinite(Number(raw?.x))
                ? Number(raw.x)
                : fallbackX;
              const y = Number.isFinite(Number(raw?.y))
                ? Number(raw.y)
                : fallbackY;
              return {
                id: String(raw?.id || `node_${i}`),
                x,
                y,
                w,
                h,
                cx: x + w * 0.5,
                cy: y + h * 0.5,
                degree: 0,
              };
            },
          );

          const byId = new Map();
          nodes.forEach((n, i) => byId.set(n.id, i));

          const edges = [];
          for (const edge of Array.isArray(rawEdges) ? rawEdges : []) {
            const a = byId.get(String(edge?.s));
            const b = byId.get(String(edge?.t));
            if (a == null || b == null || a === b) continue;
            edges.push({ a, b, weak: !!edge?.dashed });
            nodes[a].degree += 1;
            nodes[b].degree += 1;
          }

          state.editorMap.nodes = nodes;
          state.editorMap.edges = edges;
          state.editorMap.byId = byId;
          fitEditorMiniMap(true);
        }

        function fitEditorMiniMap(forceRedraw = false) {
          const nodes = state.editorMap.nodes;
          if (!nodes.length || !dom.miniMap) return;
          const rect = dom.miniMap.getBoundingClientRect();
          if (!rect.width || !rect.height) return;

          let minX = Infinity;
          let minY = Infinity;
          let maxX = -Infinity;
          let maxY = -Infinity;
          for (const n of nodes) {
            if (n.cx < minX) minX = n.cx;
            if (n.cx > maxX) maxX = n.cx;
            if (n.cy < minY) minY = n.cy;
            if (n.cy > maxY) maxY = n.cy;
          }

          const spanX = Math.max(1, maxX - minX);
          const spanY = Math.max(1, maxY - minY);
          const margin = 24;
          const zoom = Math.min(
            (rect.width - margin * 2) / spanX,
            (rect.height - margin * 2) / spanY,
          );

          const view = state.editorMap.view;
          view.zoom = THREE.MathUtils.clamp(zoom, 0.035, 6);
          view.panX = rect.width * 0.5 - (minX + maxX) * 0.5 * view.zoom;
          view.panY = rect.height * 0.5 - (minY + maxY) * 0.5 * view.zoom;
          state.dataViewsDirty = true;
          if (forceRedraw) renderAnalysisDataViews();
        }

        function editorMapWorldToScreen(x, y) {
          const view = state.editorMap.view;
          return {
            x: x * view.zoom + view.panX,
            y: y * view.zoom + view.panY,
          };
        }

        function editorMapScreenToWorld(x, y) {
          const view = state.editorMap.view;
          const z = Math.max(0.0001, view.zoom);
          return {
            x: (x - view.panX) / z,
            y: (y - view.panY) / z,
          };
        }

        function pickEditorMapNode(localX, localY) {
          let best = -1;
          let bestDist = Infinity;
          for (const mapNode of state.editorMap.nodes) {
            const idx = state.nodeIndexById.get(mapNode.id);
            if (idx == null) continue;
            const node = state.nodes[idx];
            if (!node || node.visibleByFilter === false) continue;
            const p = editorMapWorldToScreen(mapNode.cx, mapNode.cy);
            const d = Math.hypot(localX - p.x, localY - p.y);
            const r = THREE.MathUtils.clamp(
              2.4 + Math.sqrt(mapNode.degree + 1) * 0.46,
              3,
              8,
            );
            if (d <= r + 4 && d < bestDist) {
              bestDist = d;
              best = idx;
            }
          }
          return best;
        }

        function updateEditorMapInfo(visibleNodes, visibleEdges) {
          if (!dom.editorMapInfo) return;
          if (state.selected >= 0 && state.nodes[state.selected]) {
            const n = state.nodes[state.selected];
            dom.editorMapInfo.textContent = `Selected: ${n.title} · ${visibleNodes} visible nodes · ${visibleEdges} visible edges`;
            return;
          }
          dom.editorMapInfo.textContent = `${visibleNodes} visible nodes · ${visibleEdges} visible edges`;
        }

        function computeFilteredActionSeries() {
          const nodes = state.nodes.filter((n) => n.visibleByFilter !== false);
          const weekMs = 7 * 24 * 60 * 60 * 1000;
          const dated = [];
          for (const node of nodes) {
            const t = parseDateSafe(node.date);
            if (t == null) continue;
            dated.push({ node, t });
          }

          if (!dated.length) {
            return {
              labels: [],
              exploring: [],
              making: [],
              total: [],
            };
          }

          const startMs = Math.min(...dated.map((d) => d.t));
          const labels = [];
          const exploring = [];
          const making = [];
          const total = [];

          for (const item of dated) {
            const week = Math.max(0, Math.floor((item.t - startMs) / weekMs));
            while (labels.length <= week) {
              labels.push(`W${labels.length + 1}`);
              exploring.push(0);
              making.push(0);
              total.push(0);
            }
            total[week] += 1;
            const action = normValue(item.node.action, "").toLowerCase();
            if (action === "exploring") exploring[week] += 1;
            else if (action === "making") making[week] += 1;
          }

          return {
            labels,
            exploring,
            making,
            total,
          };
        }

        function renderTimelineChart() {
          const prep = prepCanvas2D(dom.lineChart);
          if (!prep) return;
          const { ctx, width, height } = prep;
          const series = computeFilteredActionSeries();

          if (!series.labels.length) {
            if (dom.timelineMeta) dom.timelineMeta.textContent = "0 weeks";
            drawChartPlaceholder(
              ctx,
              width,
              height,
              "No filtered nodes with dates",
            );
            return;
          }

          const totalNodes = series.total.reduce((sum, v) => sum + v, 0);
          if (dom.timelineMeta) {
            dom.timelineMeta.textContent = `${series.labels.length} weeks · ${totalNodes} nodes`;
          }

          const m = { l: 38, r: 14, t: 14, b: 26 };
          const pw = Math.max(10, width - m.l - m.r);
          const ph = Math.max(10, height - m.t - m.b);
          const maxY = Math.max(
            1,
            ...series.exploring,
            ...series.making,
            ...series.total,
          );

          ctx.clearRect(0, 0, width, height);
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, width, height);
          ctx.strokeStyle = "rgba(0,0,0,0.08)";
          ctx.strokeRect(0.5, 0.5, width - 1, height - 1);

          ctx.strokeStyle = "rgba(0,0,0,0.1)";
          ctx.lineWidth = 1;
          for (let i = 0; i <= 4; i++) {
            const y = m.t + (ph * i) / 4;
            ctx.beginPath();
            ctx.moveTo(m.l, y);
            ctx.lineTo(m.l + pw, y);
            ctx.stroke();
          }

          ctx.fillStyle = "#666";
          ctx.font =
            '10px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
          ctx.textAlign = "right";
          ctx.textBaseline = "middle";
          for (let i = 0; i <= 4; i++) {
            const val = Math.round(maxY - (maxY * i) / 4);
            const y = m.t + (ph * i) / 4;
            ctx.fillText(String(val), m.l - 6, y);
          }

          const pointX = (index) =>
            series.labels.length <= 1
              ? m.l + pw * 0.5
              : m.l + (pw * index) / (series.labels.length - 1);
          const pointY = (value) => m.t + ph - (value / maxY) * ph;

          const drawSeries = (values, color, widthPx = 2) => {
            ctx.beginPath();
            for (let i = 0; i < values.length; i++) {
              const x = pointX(i);
              const y = pointY(values[i]);
              if (i === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = color;
            ctx.lineWidth = widthPx;
            ctx.stroke();
            ctx.fillStyle = color;
            for (let i = 0; i < values.length; i++) {
              const x = pointX(i);
              const y = pointY(values[i]);
              ctx.beginPath();
              ctx.arc(x, y, 2.5, 0, Math.PI * 2);
              ctx.fill();
            }
          };

          drawSeries(series.exploring, "#0b9bb8");
          drawSeries(series.making, "#572F10");
          drawSeries(series.total, "#111111", 2.2);

          const tickIdx = [
            ...new Set([
              0,
              Math.floor((series.labels.length - 1) * 0.5),
              series.labels.length - 1,
            ]),
          ];
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.fillStyle = "#666";
          for (const idx of tickIdx) {
            const x = pointX(idx);
            ctx.fillText(series.labels[idx], x, m.t + ph + 6);
          }

          ctx.textAlign = "left";
          ctx.textBaseline = "top";
          ctx.font =
            '11px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
          ctx.fillStyle = "#0b9bb8";
          ctx.fillText("Exploring", m.l + 4, 6);
          ctx.fillStyle = "#572F10";
          ctx.fillText("Making", m.l + 82, 6);
          ctx.fillStyle = "#111111";
          ctx.fillText("Total", m.l + 144, 6);
        }

        function renderTotalsChart() {
          const prep = prepCanvas2D(dom.totalsChart);
          if (!prep) return;
          const { ctx, width, height } = prep;
          const visible = state.nodes.filter(
            (n) => n.visibleByFilter !== false,
          );
          let exploring = 0;
          let making = 0;
          for (const node of visible) {
            const action = normValue(node.action, "").toLowerCase();
            if (action === "exploring") exploring += 1;
            else if (action === "making") making += 1;
          }
          const total = visible.length;

          if (!total) {
            drawChartPlaceholder(ctx, width, height, "No visible nodes");
            return;
          }

          const data = [
            { label: "Exploring", value: exploring, color: "#0b9bb8" },
            { label: "Making", value: making, color: "#572F10" },
            { label: "Total", value: total, color: "#111111" },
          ];
          const max = Math.max(1, ...data.map((d) => d.value));
          const m = { l: 22, r: 14, t: 10, b: 24 };
          const pw = Math.max(10, width - m.l - m.r);
          const ph = Math.max(10, height - m.t - m.b);

          ctx.clearRect(0, 0, width, height);
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, width, height);
          ctx.strokeStyle = "rgba(0,0,0,0.08)";
          ctx.strokeRect(0.5, 0.5, width - 1, height - 1);

          const slot = pw / data.length;
          data.forEach((entry, i) => {
            const bw = Math.min(42, slot * 0.56);
            const bx = m.l + slot * i + (slot - bw) * 0.5;
            const bh = (entry.value / max) * ph;
            const by = m.t + ph - bh;
            ctx.fillStyle = entry.color;
            ctx.fillRect(bx, by, bw, bh);
            ctx.fillStyle = "#4e4e4e";
            ctx.font =
              '10px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
            ctx.textAlign = "center";
            ctx.textBaseline = "top";
            ctx.fillText(entry.label, bx + bw * 0.5, m.t + ph + 6);
            ctx.textBaseline = "bottom";
            ctx.fillText(String(entry.value), bx + bw * 0.5, by - 3);
          });
        }

        function renderMiniMapChart() {
          const prep = prepCanvas2D(dom.miniMap);
          if (!prep) return;
          const { ctx, width, height } = prep;

          const editorNodes = state.editorMap.nodes;
          const editorEdges = state.editorMap.edges;
          if (!editorNodes.length) {
            if (dom.miniMapMeta)
              dom.miniMapMeta.textContent = "Editor navigator";
            updateEditorMapInfo(0, 0);
            drawChartPlaceholder(ctx, width, height, "No editor data");
            return;
          }

          const colorMode = mapColorModeValue();
          const stats =
            colorMode === "none" ? new Map() : collectModeStats(colorMode);
          const visibleSet = new Set();
          let visibleNodes = 0;
          for (const mapNode of editorNodes) {
            const node = analysisNodeById(mapNode.id);
            if (!node || node.visibleByFilter === false) continue;
            visibleSet.add(mapNode.id);
            visibleNodes += 1;
          }

          let visibleEdges = 0;
          for (const edge of editorEdges) {
            const a = editorNodes[edge.a];
            const b = editorNodes[edge.b];
            if (!a || !b) continue;
            if (!visibleSet.has(a.id) || !visibleSet.has(b.id)) continue;
            visibleEdges += 1;
          }

          if (dom.miniMapMeta) {
            dom.miniMapMeta.textContent = `Editor navigator · ${visibleNodes}/${editorNodes.length} nodes`;
          }
          updateEditorMapInfo(visibleNodes, visibleEdges);

          if (!visibleNodes) {
            drawChartPlaceholder(ctx, width, height, "No visible nodes");
            return;
          }

          ctx.clearRect(0, 0, width, height);
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, width, height);
          ctx.strokeStyle = "rgba(0,0,0,0.08)";
          ctx.strokeRect(0.5, 0.5, width - 1, height - 1);

          ctx.strokeStyle = "rgba(0,0,0,0.2)";
          ctx.lineWidth = 1;
          for (const edge of editorEdges) {
            const a = editorNodes[edge.a];
            const b = editorNodes[edge.b];
            if (!a || !b) continue;
            if (!visibleSet.has(a.id) || !visibleSet.has(b.id)) continue;
            const sa = editorMapWorldToScreen(a.cx, a.cy);
            const sb = editorMapWorldToScreen(b.cx, b.cy);
            ctx.beginPath();
            ctx.moveTo(sa.x, sa.y);
            ctx.lineTo(sb.x, sb.y);
            ctx.stroke();
          }

          for (const mapNode of editorNodes) {
            const node = analysisNodeById(mapNode.id);
            if (!node || node.visibleByFilter === false) continue;
            const p = editorMapWorldToScreen(mapNode.cx, mapNode.cy);
            const isSelected =
              state.selected >= 0 &&
              state.nodes[state.selected] &&
              state.nodes[state.selected].id === mapNode.id;
            const radius = THREE.MathUtils.clamp(
              2.3 + Math.sqrt(mapNode.degree + 1) * 0.45,
              4.5,
              10,
            );

            const fill = mapNodeColorHex(mapNode, colorMode, stats);
            ctx.beginPath();
            ctx.arc(p.x, p.y, radius + (isSelected ? 3.5 : 3), 0, Math.PI * 2);
            ctx.fillStyle = "#111111";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(1.5, radius - 0.6), 0, Math.PI * 2);
            ctx.fillStyle = fill;
            ctx.fill();
          }
        }

        function renderAnalysisDataViews() {
          renderTimelineChart();
          renderTotalsChart();
          renderMiniMapChart();
          state.dataViewsDirty = false;
        }

        function renderColorEditor() {
          if (!dom.colorEditor || !dom.colorPanelMeta) return;
          const mode = activeColorMode();
          if (mode === "none") {
            dom.colorPanelMeta.textContent =
              "Turn on the action outline to show Exploring and Making.";
            dom.colorEditor.innerHTML = "";
            return;
          }

          const stats = collectModeStats(mode);
          dom.colorPanelMeta.textContent = `Action outline (${stats.size} values).`;

          const rows = [...stats.entries()].sort((a, b) => {
            if (a[1] !== b[1]) return b[1] - a[1];
            return a[0].localeCompare(b[0], "it");
          });

          if (!rows.length) {
            dom.colorEditor.innerHTML =
              '<div class="meta">No values available.</div>';

          }

          dom.colorEditor.innerHTML = rows
            .map(([value, count]) => {

              return `
 <div class="color-row">
 <span style="width:24px;height:24px;border-radius:4px;background:${esc(hex || "#ffffff")};border:1px solid rgba(0,0,0,0.08);display:block;"></span>
 <span class="name">${esc(categoryLabel(mode, value))}</span>
 <span class="count">${count}</span>
 </div>
 `;
            })
            .join("");
        }

        function applyNodeHighlighting() {
          const mode = activeColorMode();
          const value = "__all__";
          state.colorMode = mode;
          state.colorValue = value;
          const stats = mode === "none" ? new Map() : collectModeStats(mode);

          for (let i = 0; i < state.nodes.length; i++) {
            const n = state.nodes[i];
            const values = nodeValuesForMode(n, mode);
            n.material.color.setHex(0x000000);
            n.material.opacity = 1;
            n.material.transparent = false;

            if (mode === "none") {
              n.labelEl?.classList.remove("boxed");
              n.labelEl?.classList.remove("dimmed");
              n.labelEl?.style.removeProperty("--nodeBorder");
              continue;
            }

            const chosenValue = pickPrimaryNodeValue(values, stats);
            const borderHex = chosenValue ? colorHexFor(mode, chosenValue) : "";
            if (!borderHex) {
              n.labelEl?.classList.remove("boxed");
              n.labelEl?.classList.remove("dimmed");
              n.labelEl?.style.removeProperty("--nodeBorder");
              continue;
            }
            n.labelEl?.classList.add("boxed");
            n.labelEl?.classList.remove("dimmed");
            n.labelEl?.style.setProperty("--nodeBorder", borderHex);
          }
        }

        function applyImagesVisibility() {
          if (state.overviewMode) state.showImages = false;
          document.body.classList.toggle("hide-images", !state.showImages);
          updateAllNodeLabelAssets();
          if (state.selected >= 0) renderNodeMedia(state.nodes[state.selected]);
          syncToolbarToggleButtons();
        }

        function applyTextVisibility() {
          document.body.classList.toggle("hide-text", !state.showText);
          updateAllNodeLabelAssets();
          syncToolbarToggleButtons();
        }

        function refreshToolbarOptions() {
          applyNodeHighlighting();
          updateViewFilterValueOptions();
          refreshViewFilterStats();
          if (dom.selMapColorMode) {
            dom.selMapColorMode.value = activeColorMode();
          }
