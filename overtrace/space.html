          state.dataViewsDirty = true;
        }

        function normalizeAreaName(value) {
          return String(value ?? "")
            .replace(/\s+/g, " ")
            .trim();
        }

        function normalizeKeyword(value) {
          return String(value ?? "")
            .replace(/\s+/g, " ")
            .trim();
        }

        function nodeKeywordsFromData(data) {
          const tags = Array.isArray(data?.tags) ? data.tags : [];
          const cleanedTags = [
            ...new Set(tags.map((t) => normalizeKeyword(t)).filter(Boolean)),
          ];
          if (cleanedTags.length) return cleanedTags;

          const desc = normalizeKeyword(data?.desc);
          if (!desc || desc.length > 220 || !/[,;|]/.test(desc)) return [];
          const split = desc
            .split(/[,;|]/)
            .map((part) => normalizeKeyword(part))
            .filter((part) => part.length >= 3 && part.length <= 42);
          return [...new Set(split)];
        }

        function disciplineSimBounds() {
          const w = Math.max(220, discipline.width || 220);
          const h = Math.max(220, discipline.height || 220);
          const cx = w * 0.5;
          const cy = h * 0.5;
          const side = Math.max(180, Math.min(w, h));
          const half = side * 0.5;
          return {
            w,
            h,
            cx,
            cy,
            side,
            left: cx - half,
            right: cx + half,
            top: cy - half,
            bottom: cy + half,
          };
        }
        function canonicalAreaName(value) {
          const txt = normalizeAreaName(value);
          if (!txt) return "";
          const low = txt.toLowerCase();
          if (low === "speculative" || low === "speculative design")
            return "Speculative Design";
          if (low === "communication" || low === "communication design")
            return "Communication Design";
          if (low === "interaction" || low === "interaction design")
            return "Interaction Design";
          return txt;
        }
        function areaDedupeKey(value) {
          return canonicalAreaName(value)
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, " ")
            .trim()
            .replace(/\s+/g, " ");
        }
        function normalizeAreaList(areas, legacyMain = null) {
          const seen = new Set();
          const out = [];
          const push = (raw) => {
            const mapped = canonicalAreaName(raw);
            if (!mapped) return;
            const key = areaDedupeKey(mapped);
            if (!key || seen.has(key)) return;
            seen.add(key);
            out.push(mapped);
          };

          if (Array.isArray(areas)) {
            for (const a of areas) push(a);
          } else {
            push(areas);
          }
          if (Array.isArray(legacyMain)) {
            for (const a of legacyMain) push(a);
          } else {
            push(legacyMain);
          }
          return out;
        }

        const DISCIPLINE_EXPLORING_HEX = "#28F7F7";
        const DISCIPLINE_MAKING_HEX = "#572F10";
        const DISCIPLINE_NEUTRAL_HEX = "#b8b8b8";

        function disciplineRenderScale() {
          const base = DISCIPLINE_RENDER_SCALE;
          if (!discipline.nodes.length) return base;
          const cx = discipline.width * 0.5;
          const cy = discipline.height * 0.5;
          const padX = 52;
          const padY = 28;
          let maxOffsetX = 1;
          let maxOffsetY = 1;
          for (const n of discipline.nodes) {
            const extraX = n.radius + padX;
            const extraY = n.radius + padY;
            maxOffsetX = Math.max(maxOffsetX, Math.abs(n.x - cx) + extraX);
            maxOffsetY = Math.max(maxOffsetY, Math.abs(n.y - cy) + extraY);
          }
          const availableX = Math.max(24, cx - 10);
          const availableY = Math.max(24, cy - 10);
          const fit = Math.min(
            availableX / maxOffsetX,
            availableY / maxOffsetY,
          );
          return Math.max(0.22, Math.min(base, base * fit));
        }

        function mixHex(a, b, t) {
          const clamped = THREE.MathUtils.clamp(t ?? 0, 0, 1);
          const color = new THREE.Color(a);
          color.lerp(new THREE.Color(b), clamped);
          return `#${color.getHexString()}`;
        }

        function disciplineColorForActionBalance(exploringCount, makingCount) {
          const exploring = Number.isFinite(exploringCount)
            ? exploringCount
            : 0;
          const making = Number.isFinite(makingCount) ? makingCount : 0;
          if (exploring > making) return DISCIPLINE_EXPLORING_HEX;
          if (making > exploring) return DISCIPLINE_MAKING_HEX;
          return DISCIPLINE_NEUTRAL_HEX;
        }

        function disciplineStatsText() {
          return `${discipline.nodes.length} areas · ${discipline.edges.length} connections`;
        }

        function disciplineSelectionHintText() {
          if (
            discipline.selected < 0 ||
            discipline.selected >= discipline.nodes.length
          ) {
            return discipline.defaultHint;
          }
          const node = discipline.nodes[discipline.selected];
          const neighbors = disciplineNeighbors(discipline.selected).slice(
            0,
            4,
          );
          const linked = neighbors.length
            ? neighbors.map((n) => `${n.label} (${n.weight})`).join(", ")
            : "none";
          return `${node.label}: ${node.count} occurrences · connected to ${linked}`;
        }

        function setDisciplineHintText(text) {
          if (!dom.disciplineHint) return;
          const base = String(text || "")
            .trim()
            .replace(/\s*\.\s*$/, "");
          const stats = disciplineStatsText();
          dom.disciplineHint.textContent = base ? `${base} · ${stats}` : stats;
        }

        function refreshDisciplineInfo() {
          if (dom.disciplineStats) {
            dom.disciplineStats.textContent = disciplineStatsText();
          }
          setDisciplineHintText(disciplineSelectionHintText());
        }

        function renderDisciplineAreaList() {
          if (!dom.disciplineListBody || !dom.disciplineListEmpty) return;
          dom.disciplineListBody.innerHTML = "";
          const rows = [...discipline.nodes].sort((a, b) => {
            if (b.count !== a.count) return b.count - a.count;
            return a.label.localeCompare(b.label, "en");
          });
          if (!rows.length) {
            dom.disciplineListEmpty.style.display = "";
            return;
          }
          dom.disciplineListEmpty.style.display = "none";
          const frag = document.createDocumentFragment();
          for (const row of rows) {
            const el = document.createElement("div");
            el.className = "discipline-row";
            el.innerHTML = `
 <div class="area" title="${esc(row.label)}">${esc(row.label)}</div>
 <div class="num">${row.exploring || 0}</div>
 <div class="num">${row.making || 0}</div>
 `;
            frag.appendChild(el);
          }
          dom.disciplineListBody.appendChild(frag);
        }

        function clearDisciplineGraph() {
          discipline.nodes = [];
          discipline.edges = [];
          discipline.keywords = [];
          discipline.keywordMinCount = 2;
          discipline.selected = -1;
          discipline.hovered = -1;
          discipline.worldByArea = new Map();
          discipline.worldByAreaLower = new Map();
          discipline.worldBounds = { sizeX: 360, sizeZ: 360 };
          refreshDisciplineInfo();
          renderDisciplineAreaList();
        }

        function updateDisciplineWorldMap() {
          const worldByArea = new Map();
          const worldByAreaLower = new Map();

          if (!discipline.nodes.length) {
            discipline.worldByArea = worldByArea;
            discipline.worldByAreaLower = worldByAreaLower;
            discipline.worldBounds = { sizeX: 360, sizeZ: 360 };
            return;
          }

          let minX = Infinity;
          let maxX = -Infinity;
          let minY = Infinity;
          let maxY = -Infinity;
          for (const n of discipline.nodes) {
            if (n.x < minX) minX = n.x;
            if (n.x > maxX) maxX = n.x;
            if (n.y < minY) minY = n.y;
            if (n.y > maxY) maxY = n.y;
          }

          const spanX = Math.max(90, maxX - minX);
          const spanY = Math.max(90, maxY - minY);
          const targetSpan = 520;
          const spread = Math.max(spanX, spanY);
          const scale = targetSpan / spread;
          const cx = (minX + maxX) * 0.5;
          const cy = (minY + maxY) * 0.5;

          for (const n of discipline.nodes) {
            const x = (n.x - cx) * scale;
            const z = (n.y - cy) * scale;
            const r = Math.max(6, n.radius * scale * 0.28);
            const entry = { x, z, r, count: n.count, label: n.label };
            worldByArea.set(n.label, entry);
            worldByAreaLower.set(n.label.toLowerCase(), entry);
          }

          discipline.worldByArea = worldByArea;
          discipline.worldByAreaLower = worldByAreaLower;
          discipline.worldBounds = {
            sizeX: spread * scale,
            sizeZ: spread * scale,
          };
        }

        function disciplineWorldForArea(areaName) {
          const key = normalizeAreaName(areaName);
          if (!key) return null;

          let entry = discipline.worldByArea.get(key);
          if (entry) return entry;

          const low = key.toLowerCase();
          entry = discipline.worldByAreaLower.get(low);
          if (entry) return entry;

          if (low.length >= 4) {
            for (const [label, value] of discipline.worldByArea.entries()) {
              const l = label.toLowerCase();
              if (l.includes(low) || low.includes(l)) return value;
            }
          }

          return null;
        }

        function positionFromDisciplineAreas(id, lane, areas) {
          const picks = [];
          const areaList = Array.isArray(areas) ? areas : [];

          for (const area of areaList) {
            const entry = disciplineWorldForArea(area);
            if (entry) picks.push({ entry, w: 1 });
          }

          if (!picks.length) {
            const bounds = discipline.worldBounds || { sizeX: 360, sizeZ: 360 };
            const laneBiasX =
              lane === "speculative"
                ? -0.28
                : lane === "communication"
                  ? 0.28
                  : 0;
            const laneBiasZ = lane === "interaction" ? 0.25 : -0.08;
            const x =
              ((hash(`${id}_fallback_x`) % 1000) / 999 - 0.5) *
                bounds.sizeX *
                0.58 +
              laneBiasX * bounds.sizeX;
            const z =
              ((hash(`${id}_fallback_z`) % 1000) / 999 - 0.5) *
                bounds.sizeZ *
                0.58 +
              laneBiasZ * bounds.sizeZ;
            return { x, z };
          }

          let sx = 0;
          let sz = 0;
          let sw = 0;
          for (const p of picks) {
            sx += p.entry.x * p.w;
            sz += p.entry.z * p.w;
            sw += p.w;
          }

          const jitterX = ((hash(`${id}_x`) % 1000) / 999 - 0.5) * 14;
          const jitterZ = ((hash(`${id}_z`) % 1000) / 999 - 0.5) * 14;
          return {
            x: sx / Math.max(0.001, sw) + jitterX,
            z: sz / Math.max(0.001, sw) + jitterZ,
          };
        }

        function buildDisciplineGraph(rawNodes) {
          const countMap = new Map();
          const actionCounts = new Map();
          const pairMap = new Map();

          for (const rawNode of rawNodes) {
            const areasRaw = Array.isArray(rawNode.areas) ? rawNode.areas : [];
            const areas = normalizeAreaList(areasRaw);
            if (areas.length === 0) continue;

            const action = normValue(rawNode.action, "").toLowerCase();
            const actionKey =
              action === "exploring"
                ? "exploring"
                : action === "making"
                  ? "making"
                  : null;

            for (const area of areas) {
              countMap.set(area, (countMap.get(area) || 0) + 1);
              if (actionKey) {
                const cur = actionCounts.get(area) || {
                  exploring: 0,
                  making: 0,
                };
                cur[actionKey] += 1;
                actionCounts.set(area, cur);
              }
            }

            for (let i = 0; i < areas.length; i++) {
              for (let j = i + 1; j < areas.length; j++) {
                const a = areas[i];
                const b = areas[j];
                const key = a < b ? `${a}\u0000${b}` : `${b}\u0000${a}`;
                pairMap.set(key, (pairMap.get(key) || 0) + 1);
              }
            }
          }

          const entries = [...countMap.entries()].sort((a, b) => b[1] - a[1]);
          const bounds = disciplineSimBounds();
          const seedRadius = bounds.side * 0.31;

          const nodes = entries.map(([name, count], i) => {
            const t = i / Math.max(1, entries.length);
            const a =
              t * Math.PI * 2 + ((hash(`${name}_a`) % 1000) / 1000) * 0.3;
            const r =
              seedRadius * (0.56 + ((hash(`${name}_r`) % 1000) / 1000) * 0.52);
            const actions = actionCounts.get(name) || {
              exploring: 0,
              making: 0,
            };
            return {
              id: name,
              label: name,
              count,
              exploring: actions.exploring,
              making: actions.making,
              degree: 0,
              radius: THREE.MathUtils.clamp(
                11 + Math.sqrt(count) * 3.6,
                12,
                34,
              ),
              x: bounds.cx + Math.cos(a) * r,
              y: bounds.cy + Math.sin(a) * r,
              vx: 0,
              vy: 0,
              fx: 0,
              fy: 0,
              color: disciplineColorForActionBalance(
                actions.exploring,
                actions.making,
              ),
            };
          });

          const indexById = new Map();
          nodes.forEach((n, i) => indexById.set(n.id, i));

          const edges = [];
          for (const [pairKey, weight] of pairMap.entries()) {
            const [a, b] = pairKey.split("\u0000");
            const ai = indexById.get(a);
            const bi = indexById.get(b);
            if (ai == null || bi == null || ai === bi) continue;
            edges.push({ a: ai, b: bi, weight });
            nodes[ai].degree += 1;
            nodes[bi].degree += 1;
          }

          discipline.nodes = nodes;
          discipline.edges = edges;
          discipline.selected = -1;
          discipline.hovered = -1;
          renderDisciplineAreaList();

          const warmupSteps = THREE.MathUtils.clamp(
            110 + discipline.nodes.length * 8,
            120,
            420,
          );
          for (let i = 0; i < warmupSteps; i++) {
            simulateDiscipline();
          }
          updateDisciplineWorldMap();
          refreshDisciplineInfo();
        }

        function buildDisciplineKeywords(rawNodes) {
          const keywordMap = new Map();
          for (const rawNode of rawNodes) {
            const rawKeywords = Array.isArray(rawNode.keywords)
              ? rawNode.keywords
              : Array.isArray(rawNode.tags)
                ? rawNode.tags
                : [];
            const keywords = [
              ...new Set(
                rawKeywords.map((k) => normalizeKeyword(k)).filter(Boolean),
              ),
            ];
            if (!keywords.length) continue;

            const areas = Array.isArray(rawNode.areas)
              ? normalizeAreaList(rawNode.areas)
              : [];

            for (const keyword of keywords) {
              const key = keyword.toLowerCase();
              let entry = keywordMap.get(key);
              if (!entry) {
                entry = {
                  key,
                  label: keyword,
                  count: 0,
                  anchorX: 0,
                  anchorZ: 0,
                  anchorWeight: 0,
                };
                keywordMap.set(key, entry);
              }
              entry.count += 1;

              let hasAreaAnchor = false;
              for (const area of areas) {
                const world = disciplineWorldForArea(area);
                if (!world) continue;
                entry.anchorX += world.x;
                entry.anchorZ += world.z;
                entry.anchorWeight += 1;
                hasAreaAnchor = true;
              }
              if (!hasAreaAnchor) {
                const lane = areaLaneKey(areas, `kw_${keyword}`);
                const fallback = positionFromDisciplineAreas(
                  `kw_${keyword}`,
                  lane,
                  areas,
                );
                entry.anchorX += fallback.x;
                entry.anchorZ += fallback.z;
                entry.anchorWeight += 1;
              }
            }
          }

          const ranked = [...keywordMap.values()].sort((a, b) => {
            if (a.count !== b.count) return b.count - a.count;
            return a.label.localeCompare(b.label, "it");
          });

          if (!ranked.length) {
            discipline.keywords = [];
            discipline.keywordMinCount = 2;
            return;
          }

          let minCount = discipline.keywordMinCount;
          let selected = ranked.filter((entry) => entry.count >= minCount);
          if (!selected.length) {
            minCount = ranked[0].count;
            selected = ranked.slice(0, Math.min(12, ranked.length));
          }
          selected = selected.slice(0, 24);
          discipline.keywordMinCount = minCount;

          const bounds = discipline.worldBounds || { sizeX: 360, sizeZ: 360 };
          const clampX = Math.max(140, bounds.sizeX * 0.5 - 10);
          const clampZ = Math.max(140, bounds.sizeZ * 0.5 - 10);

          const layout = selected.map((entry, idx) => {
            const baseX =
              entry.anchorWeight > 0 ? entry.anchorX / entry.anchorWeight : 0;
            const baseZ =
              entry.anchorWeight > 0 ? entry.anchorZ / entry.anchorWeight : 0;
            const angle =
              ((hash(`${entry.key}_a`) % 1000) / 1000) * Math.PI * 2;
            const radius = 5 + ((hash(`${entry.key}_r`) % 1000) / 1000) * 16;
            const jitterX = Math.cos(angle) * radius;
            const jitterZ = Math.sin(angle) * radius;
            const x = THREE.MathUtils.clamp(baseX + jitterX, -clampX, clampX);
            const z = THREE.MathUtils.clamp(baseZ + jitterZ, -clampZ, clampZ);
            const r = THREE.MathUtils.clamp(
              7 + entry.label.length * 0.25 + Math.log1p(entry.count) * 2.1,
              10,
              28,
            );
            return {
              key: entry.key,
              label: entry.label,
              count: entry.count,
              anchorX: x,
              anchorZ: z,
              x,
              z,
              vx: 0,
              vz: 0,
              radius: r,
              order: idx,
            };
          });

          const steps = 90;
          for (let iter = 0; iter < steps; iter++) {
            for (let i = 0; i < layout.length; i++) {
              const a = layout[i];
              for (let j = i + 1; j < layout.length; j++) {
                const b = layout[j];
                let dx = a.x - b.x;
                let dz = a.z - b.z;
                let dist = Math.hypot(dx, dz);
                if (dist < 0.001) {
                  const angle = ((i + 1) * (j + 3) * 0.731) % (Math.PI * 2);
                  dx = Math.cos(angle);
                  dz = Math.sin(angle);
                  dist = 1;
                }
                const minDist = a.radius + b.radius + 4;
                if (dist >= minDist) continue;
                const push = ((minDist - dist) / minDist) * 0.95;
                const nx = dx / dist;
                const nz = dz / dist;
                a.vx += nx * push;
                a.vz += nz * push;
                b.vx -= nx * push;
                b.vz -= nz * push;
              }
            }

            for (const item of layout) {
              item.vx += (item.anchorX - item.x) * 0.018;
              item.vz += (item.anchorZ - item.z) * 0.018;
              item.vx *= 0.78;
              item.vz *= 0.78;
              item.x = THREE.MathUtils.clamp(item.x + item.vx, -clampX, clampX);
              item.z = THREE.MathUtils.clamp(item.z + item.vz, -clampZ, clampZ);
            }
          }

          discipline.keywords = layout.map((entry) => ({
            key: entry.key,
            label: entry.label,
            count: entry.count,
            x: entry.x,
            z: entry.z,
          }));
        }

        function disciplineNeighbors(index) {
          if (index < 0 || index >= discipline.nodes.length) return [];
          const neighbors = [];
          for (const e of discipline.edges) {
            if (e.a !== index && e.b !== index) continue;
            const other = e.a === index ? e.b : e.a;
            neighbors.push({
              label: discipline.nodes[other].label,
              weight: e.weight,
            });
          }
          neighbors.sort((a, b) => b.weight - a.weight);
          return neighbors;
        }

        function selectDiscipline(index) {
          discipline.selected = index;
          refreshDisciplineInfo();
        }

        function pickDisciplineAt(clientX, clientY) {
          const rect = dom.disciplineCanvas.getBoundingClientRect();
          if (!rect.width || !rect.height) return -1;
          const x = clientX - rect.left;
          const y = clientY - rect.top;
          const cx = discipline.width * 0.5;
          const cy = discipline.height * 0.5;
          const renderScale = disciplineRenderScale();
          let best = -1;
          let bestScore = Infinity;
          for (let i = 0; i < discipline.nodes.length; i++) {
            const n = discipline.nodes[i];
            const sx = cx + (n.x - cx) * renderScale;
            const sy = cy + (n.y - cy) * renderScale;
            const sr = n.radius * renderScale;
            const dx = x - sx;
            const dy = y - sy;
            const dist = Math.hypot(dx, dy);
            if (dist <= sr) {
              const score = dist - sr * 0.2;
              if (score < bestScore) {
                bestScore = score;
                best = i;
              }
            }
          }
          return best;
        }

        function simulateDiscipline() {
          if (!discipline.nodes.length) return;

          const repulsion = 7600;
          const spring = 0.024;
          const centerPull = 0.008;
          const damping = 0.87;
          const bounds = disciplineSimBounds();

          for (const n of discipline.nodes) {
            n.fx = 0;
            n.fy = 0;
          }

          for (let i = 0; i < discipline.nodes.length; i++) {
            const a = discipline.nodes[i];
            for (let j = i + 1; j < discipline.nodes.length; j++) {
              const b = discipline.nodes[j];
              let dx = a.x - b.x;
              let dy = a.y - b.y;
              let distSq = dx * dx + dy * dy;
              if (distSq < 1) {
                dx = (Math.random() - 0.5) * 2;
                dy = (Math.random() - 0.5) * 2;
                distSq = dx * dx + dy * dy;
              }
              const dist = Math.sqrt(distSq);
              const f = repulsion / distSq;
              const nx = dx / dist;
              const ny = dy / dist;
              a.fx += nx * f;
              a.fy += ny * f;
              b.fx -= nx * f;
              b.fy -= ny * f;
            }
          }

          for (const e of discipline.edges) {
            const a = discipline.nodes[e.a];
            const b = discipline.nodes[e.b];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.max(0.001, Math.hypot(dx, dy));
            const target =
              38 + (a.radius + b.radius) * 2.15 - Math.min(12, e.weight * 1.1);
            const stretch = dist - target;
            const strength = spring * (1 + Math.log1p(e.weight) * 0.55);
            const fx = (dx / dist) * stretch * strength;
            const fy = (dy / dist) * stretch * strength;
            a.fx += fx;
            a.fy += fy;
            b.fx -= fx;
            b.fy -= fy;
          }

          for (const n of discipline.nodes) {
            n.fx += (bounds.cx - n.x) * centerPull;
            n.fy += (bounds.cy - n.y) * centerPull;

            n.vx = (n.vx + n.fx * 0.012) * damping;
            n.vy = (n.vy + n.fy * 0.012) * damping;

            const speed = Math.hypot(n.vx, n.vy);
            if (speed > 3.1) {
              const scale = 3.1 / speed;
              n.vx *= scale;
              n.vy *= scale;
            }

            n.x += n.vx;
            n.y += n.vy;

            const pad = n.radius + 12;
            if (n.x < bounds.left + pad) {
              n.x = bounds.left + pad;
              n.vx *= -0.35;
            } else if (n.x > bounds.right - pad) {
              n.x = bounds.right - pad;
              n.vx *= -0.35;
            }
            if (n.y < bounds.top + pad) {
              n.y = bounds.top + pad;
              n.vy *= -0.35;
            } else if (n.y > bounds.bottom - pad) {
              n.y = bounds.bottom - pad;
              n.vy *= -0.35;
            }
          }
        }

        function renderDiscipline() {
          if (!disciplineCtx) return;
          const { width, height, pixelRatio } = discipline;
          const cx = width * 0.5;
          const cy = height * 0.5;
          disciplineCtx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
          disciplineCtx.clearRect(0, 0, width, height);
          disciplineCtx.fillStyle = "#ffffff";
          disciplineCtx.fillRect(0, 0, width, height);

          if (!discipline.nodes.length) return;
          const renderScale = disciplineRenderScale();
          const hoverIndex =
            discipline.hovered >= 0 &&
            discipline.hovered < discipline.nodes.length
              ? discipline.hovered
              : -1;
          const hasHover = hoverIndex >= 0;

          for (const e of discipline.edges) {
            const a = discipline.nodes[e.a];
            const b = discipline.nodes[e.b];
            const ax = cx + (a.x - cx) * renderScale;
            const ay = cy + (a.y - cy) * renderScale;
            const bx = cx + (b.x - cx) * renderScale;
            const by = cy + (b.y - cy) * renderScale;
            disciplineCtx.beginPath();
            disciplineCtx.moveTo(ax, ay);
            disciplineCtx.lineTo(bx, by);
            disciplineCtx.strokeStyle = "rgba(0,0,0,0.14)";
            disciplineCtx.lineWidth = 0.65;
            disciplineCtx.stroke();
          }

          for (let i = 0; i < discipline.nodes.length; i++) {
            const n = discipline.nodes[i];
            const sx = cx + (n.x - cx) * renderScale;
            const sy = cy + (n.y - cy) * renderScale;
            const sr = n.radius * renderScale;

            disciplineCtx.beginPath();
            disciplineCtx.arc(sx, sy, sr, 0, Math.PI * 2);
            disciplineCtx.fillStyle = "#ffffff";
            disciplineCtx.fill();
            disciplineCtx.strokeStyle =
              hasHover && i !== hoverIndex
                ? DISCIPLINE_NEUTRAL_HEX
                : state.actionOutlineEnabled
                  ? n.color || DISCIPLINE_NEUTRAL_HEX
                  : DISCIPLINE_NEUTRAL_HEX;
            disciplineCtx.lineWidth = 1.3;
            disciplineCtx.stroke();
          }

          // Draw labels last, centered on each bubble.
          disciplineCtx.save();
          disciplineCtx.textAlign = "center";
          disciplineCtx.textBaseline = "middle";
          disciplineCtx.font = '700 11px "Times New Roman", Times, serif';
          const placedTextRects = [];
          const intersectsTextRect = (a, b) =>
            a.x < b.x + b.w &&
            a.x + a.w > b.x &&
            a.y < b.y + b.h &&
            a.y + a.h > b.y;
          const clampY = (y, h) =>
            Math.max(h * 0.5, Math.min(height - h * 0.5, y));
          for (let i = 0; i < discipline.nodes.length; i++) {
            const n = discipline.nodes[i];
            const sx = cx + (n.x - cx) * renderScale;
            const sy = cy + (n.y - cy) * renderScale;
            const shortLabel =
              n.label.length > 26 ? `${n.label.slice(0, 24)}..` : n.label;
            const metrics = disciplineCtx.measureText(shortLabel);
            const textW = metrics.width;
            const textH =
              Math.max(
                1,
                (metrics.actualBoundingBoxAscent || 0) +
                  (metrics.actualBoundingBoxDescent || 0),
              ) || 11;
            const originalY = sy;
            const deltaStep = Math.max(8, textH);
            const deltas = [
              0,
              -deltaStep,
              deltaStep,
              -2 * deltaStep,
              2 * deltaStep,
              -3 * deltaStep,
              3 * deltaStep,
            ];
            let drawY = originalY;
            for (const d of deltas) {
              const yTry = clampY(originalY + d, textH);
              const rect = {
                x: n.x - textW * 0.5,
                y: yTry - textH * 0.5,
                w: textW,
                h: textH,
              };
              let collides = false;
              for (const prev of placedTextRects) {
                if (intersectsTextRect(rect, prev)) {
                  collides = true;
                  break;
                }
              }
              if (!collides) {
                drawY = yTry;
                placedTextRects.push(rect);
                break;
              }
            }
            disciplineCtx.fillStyle =
              hasHover && i !== hoverIndex ? DISCIPLINE_NEUTRAL_HEX : "#111111";
            disciplineCtx.fillText(shortLabel, sx, drawY);
          }
          disciplineCtx.restore();
        }

        function clearThreeGroup(group) {
          const disposeMaterial = (material) => {
            if (!material) return;
            material.map?.dispose?.();
            material.alphaMap?.dispose?.();
            material.dispose?.();
          };
          while (group.children.length > 0) {
            const child = group.children[group.children.length - 1];
            group.remove(child);
            child.geometry?.dispose?.();
            if (Array.isArray(child.material)) {
              for (const m of child.material) disposeMaterial(m);
            } else {
              disposeMaterial(child.material);
            }
          }
        }

        function buildKeywordSprite(label, count) {
          const text = normalizeKeyword(label);
          if (!text) return null;

          const fontSize = Math.round(
            THREE.MathUtils.clamp(11 + Math.log1p(count) * 2.4, 11, 18),
          );
          const paddingX = 9;
          const paddingY = 5;
          const fontFamily = '"Times New Roman", Times, serif';

          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          if (!ctx) return null;
          ctx.font = `700 ${fontSize}px ${fontFamily}`;
          const textWidth = Math.ceil(ctx.measureText(text).width);
          const width = THREE.MathUtils.clamp(
            textWidth + paddingX * 2,
            56,
            340,
          );
          const height = Math.ceil(fontSize + paddingY * 2);
          canvas.width = width;
          canvas.height = height;

          ctx.font = `700 ${fontSize}px ${fontFamily}`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          const tx = width * 0.5;
          const ty = height * 0.5 + 0.5;
          ctx.fillStyle = "rgba(18, 18, 18, 0.9)";
          ctx.fillText(text, tx, ty);

          const texture = new THREE.CanvasTexture(canvas);
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.minFilter = THREE.LinearFilter;
          texture.magFilter = THREE.LinearFilter;
          texture.generateMipmaps = false;

          const material = new THREE.SpriteMaterial({
            map: texture,
            transparent: true,
            opacity: 0.98,
            depthWrite: false,
            depthTest: false,
          });
          const sprite = new THREE.Sprite(material);
          const pixelToWorld = THREE.MathUtils.clamp(
            0.075 + Math.log1p(count) * 0.014,
            0.075,
            0.12,
          );
          sprite.scale.set(width * pixelToWorld, height * pixelToWorld, 1);
          return sprite;
        }

        function renderDisciplineBasePlane(yLevel) {
          clearThreeGroup(baseGroup);
          if (!discipline.nodes.length) return;

          const bounds = discipline.worldBounds || { sizeX: 360, sizeZ: 360 };
          const halfX = Math.max(180, bounds.sizeX * 0.5 + 52);
          const halfZ = Math.max(170, bounds.sizeZ * 0.5 + 52);

          const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(halfX * 2, halfZ * 2),
            new THREE.MeshBasicMaterial({
              color: 0xffffff,
              transparent: false,
              opacity: 1,
              side: THREE.DoubleSide,
              depthWrite: false,
              polygonOffset: true,
              polygonOffsetFactor: 1,
              polygonOffsetUnits: 1,
            }),
          );
          plane.rotation.x = -Math.PI * 0.5;
          plane.position.set(0, yLevel, 0);
          plane.renderOrder = -40;
          baseGroup.add(plane);

          const border = new THREE.LineSegments(
            new THREE.EdgesGeometry(
              new THREE.PlaneGeometry(halfX * 2, halfZ * 2),
            ),
            new THREE.LineBasicMaterial({
              color: 0x8a8a8a,
              transparent: true,
              opacity: 0.5,
              depthWrite: false,
              depthTest: false,
            }),
          );
          border.rotation.x = -Math.PI * 0.5;
          border.position.set(0, yLevel + 0.03, 0);
          border.renderOrder = -38;
          baseGroup.add(border);

          if (discipline.edges.length) {
            const pos = new Float32Array(discipline.edges.length * 6);
            let i = 0;
            for (const edge of discipline.edges) {
              const a = discipline.nodes[edge.a];
              const b = discipline.nodes[edge.b];
              const aw = discipline.worldByArea.get(a.label);
              const bw = discipline.worldByArea.get(b.label);
              if (!aw || !bw) continue;
              pos[i * 6 + 0] = aw.x;
              pos[i * 6 + 1] = yLevel + 0.06;
              pos[i * 6 + 2] = aw.z;
              pos[i * 6 + 3] = bw.x;
              pos[i * 6 + 4] = yLevel + 0.06;
              pos[i * 6 + 5] = bw.z;
              i += 1;
            }
            const used = i * 6;
            if (used > 0) {
              const geom = new THREE.BufferGeometry();
              geom.setAttribute(
                "position",
                new THREE.BufferAttribute(pos.subarray(0, used), 3),
              );
              const lines = new THREE.LineSegments(
                geom,
                new THREE.LineBasicMaterial({
                  color: 0x3d3d3d,
                  transparent: true,
                  opacity: 0.38,
                  depthWrite: false,
                  depthTest: false,
                }),
              );
              lines.renderOrder = -35;
              baseGroup.add(lines);
            }
          }

          for (const area of discipline.nodes) {
            const world = discipline.worldByArea.get(area.label);
            if (!world) continue;
            const total = (area.exploring || 0) + (area.making || 0);
            const t =
              total > 0
                ? THREE.MathUtils.clamp((area.making || 0) / total, 0, 1)
                : 0;
            const borderColor = new THREE.Color().lerpColors(
              new THREE.Color(0xe6e6e6),
              new THREE.Color(0xcccccc),
              t,
            );
            const diskRadius = Math.max(3.4, world.r * 0.5);
            const ringWidth = Math.max(0.28, diskRadius * 0.055);

            const disk = new THREE.Mesh(
              new THREE.CircleGeometry(diskRadius, 24),
              new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: false,
                opacity: 1,
                depthWrite: false,
                depthTest: false,
              }),
            );
            disk.rotation.x = -Math.PI * 0.5;
            disk.position.set(world.x, yLevel + 0.08, world.z);
            disk.renderOrder = -33;
            baseGroup.add(disk);

            const ring = new THREE.Mesh(
              new THREE.RingGeometry(
                Math.max(0.01, diskRadius - ringWidth),
                diskRadius,
                32,
              ),
              new THREE.MeshBasicMaterial({
                color: borderColor,
                transparent: false,
                opacity: 1,
                depthWrite: false,
                depthTest: false,
                side: THREE.DoubleSide,
              }),
            );
            ring.rotation.x = -Math.PI * 0.5;
            ring.position.set(world.x, yLevel + 0.1, world.z);
            ring.renderOrder = -32;
            baseGroup.add(ring);
          }

          for (const area of discipline.nodes) {
            const world = discipline.worldByArea.get(area.label);
            if (!world) continue;
            const sprite = buildKeywordSprite(area.label, area.count || 1);
            if (!sprite) continue;
            sprite.position.set(world.x, yLevel + 0.7, world.z);
            sprite.renderOrder = -28;
            baseGroup.add(sprite);
          }
        }

        function relaxInitialNodeSpread(nodes, edges) {
          if (!nodes.length) return;

          const anchors = nodes.map((n) => ({ x: n.pos.x, z: n.pos.z }));
          const repulsion = 3600;
          const spring = 0.02;
          const baseDist = 62;
          const anchorPull = 0.026;
          const damping = 0.8;
          const iterations = THREE.MathUtils.clamp(
            155 + Math.floor(nodes.length * 0.55),
            160,
            320,
          );

          for (let iter = 0; iter < iterations; iter++) {
            for (const n of nodes) n.force.set(0, 0, 0);

            for (let i = 0; i < nodes.length; i++) {
              const a = nodes[i];
              for (let j = i + 1; j < nodes.length; j++) {
                const b = nodes[j];
                let dx = a.pos.x - b.pos.x;
                let dz = a.pos.z - b.pos.z;
                let distSq = dx * dx + dz * dz;
                if (distSq < 1) {
                  dx = (Math.random() - 0.5) * 2;
                  dz = (Math.random() - 0.5) * 2;
                  distSq = dx * dx + dz * dz;
                }
                const dist = Math.sqrt(distSq);
                const force = repulsion / distSq;
                const nx = dx / dist;
                const nz = dz / dist;
                a.force.x += nx * force;
                a.force.z += nz * force;
                b.force.x -= nx * force;
                b.force.z -= nz * force;
              }
            }

            for (const e of edges) {
              const a = nodes[e.a];
              const b = nodes[e.b];
              const dx = b.pos.x - a.pos.x;
              const dz = b.pos.z - a.pos.z;
              const dist = Math.max(0.001, Math.hypot(dx, dz));
              const target = e.weak ? baseDist * 1.14 : baseDist;
              const stretch = dist - target;
              const fx = (dx / dist) * stretch * spring;
              const fz = (dz / dist) * stretch * spring;
              a.force.x += fx;
              a.force.z += fz;
              b.force.x -= fx;
              b.force.z -= fz;
            }

            for (let i = 0; i < nodes.length; i++) {
              const n = nodes[i];
              const anchor = anchors[i];
              n.force.x += (anchor.x - n.pos.x) * anchorPull;
              n.force.z += (anchor.z - n.pos.z) * anchorPull;

              n.vel.x = (n.vel.x + n.force.x * 0.012) * damping;
              n.vel.z = (n.vel.z + n.force.z * 0.012) * damping;
              const speed = Math.hypot(n.vel.x, n.vel.z);
              if (speed > 3.4) {
                const s = 3.4 / speed;
                n.vel.x *= s;
                n.vel.z *= s;
              }

              n.pos.x += n.vel.x;
              n.pos.z += n.vel.z;
            }
          }

          for (const n of nodes) {
            n.home.x = n.pos.x;
            n.home.z = n.pos.z;
            n.mesh.position.copy(n.pos);
            n.vel.set(0, 0, 0);
          }
        }

        function colorForType(type) {
          const key = String(type || "untitled")
            .toLowerCase()
            .trim();
          const idx = hash(key) % TYPE_COLORS.length;
          return new THREE.Color(TYPE_COLORS[idx]);
        }

        function buildStars() {
          const count = 850;
          const geom = new THREE.BufferGeometry();
          const arr = new Float32Array(count * 3);
          for (let i = 0; i < count; i++) {
            const radius = 700 + Math.random() * 800;
            const phi = Math.random() * Math.PI * 2;
            const t = Math.random() * 2 - 1;
            const s = Math.sqrt(1 - t * t);
            arr[i * 3 + 0] = radius * s * Math.cos(phi);
            arr[i * 3 + 1] = radius * t;
            arr[i * 3 + 2] = radius * s * Math.sin(phi);
          }
          geom.setAttribute("position", new THREE.BufferAttribute(arr, 3));
          const mat = new THREE.PointsMaterial({
            color: 0x9d9d9d,
            size: 1,
            transparent: true,
            opacity: 0.35,
          });
          return new THREE.Points(geom, mat);
        }

        function buildArrowHeadTexture() {
          const canvas = document.createElement("canvas");
          canvas.width = 512;
          canvas.height = 512;
          const ctx = canvas.getContext("2d");
          if (!ctx) return null;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = "high";

          // Arrow tip inspired by Vector.svg, drawn as a clean right-facing triangle.
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.moveTo(84, 90);
          ctx.lineTo(452, 256);
          ctx.lineTo(84, 422);
          ctx.closePath();
          ctx.fill();

          const texture = new THREE.CanvasTexture(canvas);
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.minFilter = THREE.LinearFilter;
          texture.magFilter = THREE.LinearFilter;
          texture.generateMipmaps = false;
          texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
          return texture;
        }

        function edgeScreenAngle(a, b) {
          tmpProjA.copy(a).project(camera);
          tmpProjB.copy(b).project(camera);
          return Math.atan2(tmpProjB.y - tmpProjA.y, tmpProjB.x - tmpProjA.x);
        }

        function clearGraph() {
          dom.labelsLayer.innerHTML = "";

          clearThreeGroup(nodesGroup);
          clearThreeGroup(edgesGroup);
          clearThreeGroup(baseGroup);

          state.nodes = [];
          state.edges = [];
          state.edgeLines = null;
          state.edgePositions = null;
          state.edgeArrows = [];
          state.nodeIndexById = new Map();
          state.editorMap.nodes = [];
          state.editorMap.edges = [];
          state.editorMap.byId = new Map();
          state.editorMap.view.zoom = 1;
          state.editorMap.view.panX = 0;
          state.editorMap.view.panY = 0;
          state.editorMap.view.isPanning = false;
          state.editorMap.view.pointerId = null;
          state.editorMap.view.moved = false;
          state.selected = -1;
          clearDisciplineGraph();
          if (dom.nodeInfo) {
            dom.nodeInfo.innerHTML =

          }
          if (dom.nodeDesc) dom.nodeDesc.textContent = "";

          refreshViewFilterStats();

        function buildGraph(project, label) {
          clearGraph();
          setRawProject(project);
          const rawNodes = Array.isArray(project?.nodes) ? project.nodes : [];
          const rawEdges = Array.isArray(project?.edges) ? project.edges : [];
          if (!rawNodes.length) throw new Error("JSON has no nodes");
          const parsedDates = rawNodes.map((n) =>
            parseDateSafe(nodePayload(n)?.date),
          );
          const validDates = parsedDates.filter((d) => d != null);
          const minDate = validDates.length ? Math.min(...validDates) : 0;
          const maxDate = validDates.length
            ? Math.max(...validDates)
            : Math.max(1, rawNodes.length - 1);
          const dateSpan = Math.max(1, maxDate - minDate);
          const verticalSpan = THREE.MathUtils.clamp(
            Math.max(320, rawNodes.length * 12),
            320,
            1500,
          );
          const yTop = verticalSpan * 0.5;
          const yBottom = -verticalSpan * 0.5;
          const inputNodes = rawNodes.map((n, i) => {
            const data = nodePayload(n);
            const sourceFiles = Array.isArray(data.files)
              ? data.files
              : Array.isArray(n.files)
                ? n.files
                : [];
            return {
              id: String(n.id || `node_${i}`),
              title: data.title || "(untitled)",
              type: data.type || "Unknown",
              action: data.action || "-",
              date: data.date || "-",
              areas: normalizeAreaList(data.areas),
              tags: Array.isArray(data.tags) ? data.tags : [],
              keywords: nodeKeywordsFromData(data),
              desc: data.desc || "",
              files: state.overviewMode ? [] : sourceFiles,
            };
          });

          buildDisciplineGraph(inputNodes);
          buildDisciplineKeywords(inputNodes);
          renderDisciplineBasePlane(yBottom - 26);

          const idToIndex = new Map();

          const nodes = inputNodes.map((source, i) => {
            const id = source.id;
            const lane = areaLaneKey(source.areas, id);
            const parsedDate = parsedDates[i];
            const fallbackDate =
              minDate + (i / Math.max(1, rawNodes.length - 1)) * dateSpan;
            const nodeDate = parsedDate == null ? fallbackDate : parsedDate;
            const t = THREE.MathUtils.clamp(
              (nodeDate - minDate) / dateSpan,
              0,
              1,
            );
            const y = yTop + (yBottom - yTop) * t;
            const areaPos = positionFromDisciplineAreas(id, lane, source.areas);
            const x = areaPos.x;
            const z = areaPos.z;

            const material = new THREE.MeshStandardMaterial({
              color: 0x000000,
              roughness: 0.36,
              metalness: 0.12,
              transparent: false,
              opacity: 1,
              emissive: 0x000000,
              emissiveIntensity: 0,
            });
            const mesh = new THREE.Mesh(
              new THREE.IcosahedronGeometry(1, 2),
              material,
            );
            mesh.position.set(x, y, z);
            mesh.userData.index = i;
            nodesGroup.add(mesh);

            const node = {
              id,
              title: source.title,
              type: source.type,
              action: source.action,
              date: source.date,
              areas: source.areas,
              tags: source.tags,
              desc: source.desc,
              files: source.files,
              pos: new THREE.Vector3(x, y, z),
              home: new THREE.Vector3(x, y, z),
              vel: new THREE.Vector3(),
              force: new THREE.Vector3(),
              degree: 0,
              radius: 2,
              lane,
              visibleByFilter: true,
              mesh,
              material,
            };

            const labelEl = document.createElement("div");
            labelEl.className = "node-label";
            labelEl.dataset.index = String(i);
            const titleEl = document.createElement("div");
            titleEl.className = "title";
            titleEl.textContent = node.title;
            const assetsEl = document.createElement("div");
            assetsEl.className = "assets";
            labelEl.addEventListener("pointerdown", (event) => {
              if (event.pointerType === "touch") return;
              state.pointerDown.labelIndex = i;
              beginScenePointerInteraction(
                event.clientX,
                event.clientY,
                event.button,
              );
            });
            labelEl.append(titleEl, assetsEl);
            dom.labelsLayer.appendChild(labelEl);
            node.labelEl = labelEl;
            node.labelTitleEl = titleEl;
            node.labelAssetsEl = assetsEl;
            updateNodeLabelAssets(node);

            idToIndex.set(id, i);
            return node;
          });

          const edges = [];
          for (const e of rawEdges) {
            const a = idToIndex.get(String(e.s));
            const b = idToIndex.get(String(e.t));
            if (a == null || b == null || a === b) continue;
            edges.push({ a, b, weak: !!e.dashed });
            nodes[a].degree += 1;
            nodes[b].degree += 1;
          }

          relaxInitialNodeSpread(nodes, edges);

          nodes.forEach((n) => {
            n.radius = THREE.MathUtils.clamp(
              0.45 + Math.sqrt(n.degree + 1) * 0.12,
              0.5,
              1.4,
            );
            n.mesh.scale.setScalar(n.radius);
            if (n.labelEl) {
              const labelWidth = Math.round(92 + n.radius * 34);
              n.labelEl.style.width = `${labelWidth}px`;
              n.labelEl.style.maxWidth = `${labelWidth}px`;
              n.labelEl.style.setProperty(
                "--assetH",
                `${Math.round(44 + n.radius * 24)}px`,
              );
            }
          });

          const edgePositions = new Float32Array(edges.length * 6);
          const edgeColors = new Float32Array(edges.length * 6);

          for (let i = 0; i < edges.length; i++) {
            const c = edges[i].weak
              ? new THREE.Color("#2a2a2a")
              : new THREE.Color("#121212");
            edgeColors[i * 6 + 0] = c.r;
            edgeColors[i * 6 + 1] = c.g;
            edgeColors[i * 6 + 2] = c.b;
            edgeColors[i * 6 + 3] = c.r;
            edgeColors[i * 6 + 4] = c.g;
            edgeColors[i * 6 + 5] = c.b;
          }

          const edgeGeom = new THREE.BufferGeometry();
          edgeGeom.setAttribute(
            "position",
            new THREE.BufferAttribute(edgePositions, 3),
          );
          edgeGeom.setAttribute(
            "color",
            new THREE.BufferAttribute(edgeColors, 3),
          );

          const edgeMat = new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: false,
            opacity: 1,
            linewidth: 2,
          });

          const edgeLines = new THREE.LineSegments(edgeGeom, edgeMat);
          edgesGroup.add(edgeLines);

          const edgeArrows = [];

          state.nodes = nodes;
          state.edges = edges;
          state.edgeLines = edgeLines;
          state.edgePositions = edgePositions;
          state.edgeArrows = edgeArrows;
          state.nodeIndexById = new Map(idToIndex);
          state.projectName = label;
          state.selected = -1;
          buildEditorMiniMap(rawNodes, rawEdges);

          updateEdges();
          if (dom.selViewMode) dom.selViewMode.value = state.viewMode || "all";
          if (dom.selViewValue)
            dom.selViewValue.value = state.viewValue || "__all__";
          refreshToolbarOptions();
          applyViewFilter();
          applyImagesVisibility();
          fitCamera(true);
          updateAllNodeLabelPositions();
          renderDiscipline();
          renderAnalysisDataViews();
          syncPreviewSnapshotButton();
        }

        function refreshProjectInfo() {
          const displayName =
            window.OvertraceUI?.formatProjectDisplayName?.(
              state.folderName || state.projectName || "",
              state.projectName || "Project",
            ) ||
            state.projectName ||
            "Project";
          dom.projectName.textContent = displayName;
        }

        function hideNodeOverlay3d() {
          if (!dom.nodeOverlay3d) return;
          dom.nodeOverlay3d.classList.add("is-hidden");
          if (dom.nodeOverlay3dMeta) dom.nodeOverlay3dMeta.textContent = "";
          if (dom.nodeOverlay3dInfo) dom.nodeOverlay3dInfo.innerHTML = "";
          if (dom.nodeOverlay3dDesc) dom.nodeOverlay3dDesc.textContent = "";
          if (dom.nodeOverlay3dMedia) dom.nodeOverlay3dMedia.innerHTML = "";
        }

        function renderNodeOverlay3d(node) {
          if (!dom.nodeOverlay3d || !node) return;
          const renderBadges = (values) =>
            values && values.length
              ? `<div class="node-overlay-badges">${values
                  .map(
                    (value) =>
                      `<span class="node-overlay-badge">${esc(value)}</span>`,
                  )
                  .join("")}</div>`
              : "-";
          dom.nodeOverlay3d.classList.remove("is-hidden");
          if (dom.nodeOverlay3dTitle) {
            dom.nodeOverlay3dTitle.textContent = node.title || "Node";
          }
          if (dom.nodeOverlay3dMeta) {
            dom.nodeOverlay3dMeta.textContent = node.date || "";
          }
          if (dom.nodeOverlay3dInfo) {
            dom.nodeOverlay3dInfo.innerHTML = `
 <div class="k">type</div><div>${esc(node.type)}</div>
 <div class="k">action</div><div>${esc(node.action)}</div>
 <div class="k">areas</div><div>${renderBadges(node.areas)}</div>
 <div class="k">tags</div><div>${renderBadges(node.tags)}</div>
 `;
          }
          if (dom.nodeOverlay3dDesc) {
            dom.nodeOverlay3dDesc.innerHTML = node.desc
              ? `<div class="node-overlay-desc-title">Description</div>${esc(node.desc)}`
              : "";
          }
          renderNodeMedia(node, dom.nodeOverlay3dMedia);
        }

        function updateEdges() {
          if (!state.edgeLines || !state.edgePositions) return;
          let write = 0;
          for (let i = 0; i < state.edges.length; i++) {
            const e = state.edges[i];
            const aNode = state.nodes[e.a];
            const bNode = state.nodes[e.b];
            const arrow = state.edgeArrows[i];
            if (!aNode || !bNode) {
              if (arrow) arrow.visible = false;
              continue;
            }
            if (
              aNode.visibleByFilter === false ||
              bNode.visibleByFilter === false
            ) {
              if (arrow) arrow.visible = false;
              continue;
            }
            const a = aNode.pos;
            const b = bNode.pos;
            state.edgePositions[write * 6 + 0] = a.x;
            state.edgePositions[write * 6 + 1] = a.y;
            state.edgePositions[write * 6 + 2] = a.z;
            state.edgePositions[write * 6 + 3] = b.x;
            state.edgePositions[write * 6 + 4] = b.y;
            state.edgePositions[write * 6 + 5] = b.z;
            write += 1;

            if (arrow) {
              tmpEdgeDir.subVectors(b, a);
              const len = tmpEdgeDir.length();
              if (len < 0.01) {
                arrow.visible = false;
              } else {
                tmpEdgeDir.multiplyScalar(1 / len);
                const maxBeforeTarget = Math.max(
                  len * 0.2,
                  len - bNode.radius * 1.5 - 0.9,
                );
                const offset = Math.min(
                  Math.max(len * 0.92, aNode.radius * 1.2 + 1.2),
                  maxBeforeTarget,
                );
                tmpEdgePos.copy(a).addScaledVector(tmpEdgeDir, offset);
                arrow.position.copy(tmpEdgePos);
                arrow.material.rotation = edgeScreenAngle(a, b);
                const size = THREE.MathUtils.clamp(len * 0.03, 1.8, 4.4);
                arrow.scale.set(size * 1.35, size * 0.9, 1);
                arrow.visible = true;
              }
            }
          }
          const attr = state.edgeLines.geometry.getAttribute("position");
          attr.needsUpdate = true;
          state.edgeLines.geometry.setDrawRange(0, write * 2);
          if (write > 0) state.edgeLines.geometry.computeBoundingSphere();
        }

        function updateEdgeArrowRotationOnly() {
          if (!state.edgeArrows || !state.edgeArrows.length) return;
          for (let i = 0; i < state.edges.length; i++) {
            const sprite = state.edgeArrows[i];
            if (!sprite || !sprite.visible) continue;
            const e = state.edges[i];
            const aNode = state.nodes[e.a];
            const bNode = state.nodes[e.b];
            if (!aNode || !bNode) continue;
            sprite.material.rotation = edgeScreenAngle(aNode.pos, bNode.pos);
          }
        }

        function selectNode(index) {
          if (index >= 0 && state.nodes[index]?.visibleByFilter === false) {
            index = -1;
          }
          if (index < 0 || index >= state.nodes.length) {
            state.selected = -1;
            if (dom.nodeInfo) {
              dom.nodeInfo.innerHTML =
                '<div class="k">info</div><div>Select a node in the network.</div>';
            }
            if (dom.nodeDesc) dom.nodeDesc.textContent = "";
            if (dom.nodeMedia) dom.nodeMedia.innerHTML = "";
            hideNodeOverlay3d();
            for (const n of state.nodes) {
              n.material.emissive.setHex(0x000000);
              n.material.emissiveIntensity = 0;
              n.mesh.scale.setScalar(n.radius);
              n.labelEl?.classList.remove("selected");
            }
            applyNodeHighlighting();
            state.dataViewsDirty = true;
            renderAnalysisDataViews();
            return;
          }

          state.selected = index;
          for (let i = 0; i < state.nodes.length; i++) {
            const n = state.nodes[i];
            if (i === index) {
              n.material.emissive.setHex(0xf2f2f2);
              n.material.emissiveIntensity = 0.3;
              n.mesh.scale.setScalar(n.radius * 1.1);
              n.labelEl?.classList.add("selected");
            } else {
              n.material.emissive.setHex(0x000000);
              n.material.emissiveIntensity = 0;
              n.mesh.scale.setScalar(n.radius);
              n.labelEl?.classList.remove("selected");
            }
          }
          applyNodeHighlighting();

          const n = state.nodes[index];
          const areaText = n.areas.length ? n.areas.join(", ") : "-";
          const tagText = n.tags.length ? n.tags.join(", ") : "-";

          if (dom.nodeInfo) {
            dom.nodeInfo.innerHTML = `
 <div class="k">title</div><div>${esc(n.title)}</div>
 <div class="k">type</div><div>${esc(n.type)}</div>
 <div class="k">action</div><div>${esc(n.action)}</div>
 <div class="k">date</div><div>${esc(n.date)}</div>
 <div class="k">areas</div><div>${esc(areaText)}</div>
 <div class="k">tags</div><div>${esc(tagText)}</div>
 `;
          }
          if (dom.nodeDesc) dom.nodeDesc.textContent = n.desc || "";
          if (dom.nodeMedia) renderNodeMedia(n);
          renderNodeOverlay3d(n);
          state.dataViewsDirty = true;
          renderAnalysisDataViews();
        }

        function resolveAssetUrl(fileEntry) {
          if (!fileEntry || !fileEntry.path) return "";
          const rel = String(fileEntry.path).replace(/^\.\//, "");
          if (!state.assetBase) return "";
          return `${state.assetBase}${rel}`;
        }

        function renderNodeMedia(node, targetEl = dom.nodeMedia) {
          if (!targetEl) return;
          targetEl.innerHTML = "";
          if (!node.files.length) return;

          const frag = document.createDocumentFragment();
          let unresolved = 0;
          let hiddenImages = 0;

          for (const file of node.files) {
            const url = resolveAssetUrl(file);

            if (!state.showImages && file.isImage) {
              hiddenImages += 1;
              continue;
            }

            if (url && file.isImage) {
              const img = document.createElement("img");
              img.src = url;
              img.alt = file.name || "image";
              img.loading = "lazy";
              img.draggable = false;
              img.onerror = () => {
                img.remove();
                const p = document.createElement("div");
                p.style.fontSize = "12px";
                p.style.color = "#777";
                p.textContent = `asset not found: ${file.path || file.name || "file"}`;
                frag.appendChild(p);
              };
              frag.appendChild(img);
              continue;
            }

            if (url) {
              const link = document.createElement("a");
              link.href = url;
              link.target = "_blank";
              link.rel = "noopener";
              link.textContent = file.name || file.path || "file";
              frag.appendChild(link);
            } else {
              unresolved += 1;
            }
          }

          if (hiddenImages > 0) {
            const p = document.createElement("div");
            p.style.fontSize = "12px";
            p.style.color = "#777";
            p.textContent = `${hiddenImages} hidden images (image toggle = off).`;
            frag.appendChild(p);
          }

          if (unresolved > 0) {
            const p = document.createElement("div");
            p.style.fontSize = "12px";
            p.style.color = "#777";
            p.textContent = `${unresolved} unresolved assets (project folder base not found).`;
            frag.appendChild(p);
          }

          targetEl.appendChild(frag);
        }

        function fitCamera(immediate) {
          if (!state.nodes.length) return;

          const box = new THREE.Box3();
          let used = 0;
          for (const n of state.nodes) {
            if (n.visibleByFilter === false) continue;
            box.expandByPoint(n.pos);
            used += 1;
          }
          if (!used) return;

          const size = box.getSize(new THREE.Vector3());
          const center = box.getCenter(new THREE.Vector3());
          const maxSpan = Math.max(size.x, size.y, size.z);

          controls.target.copy(center);
          controls.radius = Math.max(120, maxSpan * 1.5 + 60);
          controls.theta = 0.26;
          controls.phi = 1.06;
          if (immediate) updateCameraFromControls(1);
        }

        function updateCameraFromControls(smooth) {
          controls.phi = THREE.MathUtils.clamp(
            controls.phi,
            0.12,
            Math.PI - 0.12,
          );
          controls.radius = THREE.MathUtils.clamp(controls.radius, 20, 2600);

          const sinPhi = Math.sin(controls.phi);
          const targetPos = new THREE.Vector3(
            controls.target.x +
              controls.radius * sinPhi * Math.sin(controls.theta),
            controls.target.y + controls.radius * Math.cos(controls.phi),
            controls.target.z +
              controls.radius * sinPhi * Math.cos(controls.theta),
          );

          if (smooth === 1) {
            camera.position.copy(targetPos);
          } else {
            camera.position.lerp(targetPos, 0.2);
          }
          camera.lookAt(controls.target);
        }

        function beginScenePointerInteraction(clientX, clientY, button = 0) {
          state.pointerDown.x = clientX;
          state.pointerDown.y = clientY;
          state.pointerDown.active = true;
          controls.lastX = clientX;
          controls.lastY = clientY;
          if (button === 2 || state.spaceDown) controls.isPanning = true;
          else controls.isRotating = true;
          state.pointerDown.wasPan = controls.isPanning;
        }

        function simulate() {
          if (!state.nodes.length || state.paused) return;

          const repulsion = 2400;
          const spring = 0.016;
          const baseDist = 56;
          const anchorPull = 0.05;
          const damping = 0.84;

          const active = [];
          for (let i = 0; i < state.nodes.length; i++) {
            const n = state.nodes[i];
            if (n.visibleByFilter === false) continue;
            n.force.set(0, 0, 0);
            active.push(i);
          }
          if (!active.length) return;

          for (let ai = 0; ai < active.length; ai++) {
            const a = state.nodes[active[ai]];
            for (let bj = ai + 1; bj < active.length; bj++) {
              const b = state.nodes[active[bj]];
              const d = new THREE.Vector3(
                a.pos.x - b.pos.x,
                (a.pos.y - b.pos.y) * 0.2,
                a.pos.z - b.pos.z,
              );
              let distSq = d.lengthSq();
              if (distSq < 0.2) {
                d.set(
                  Math.random() - 0.5,
                  Math.random() - 0.5,
                  Math.random() - 0.5,
                );
                distSq = d.lengthSq();
              }
              const f = repulsion / distSq;
              d.normalize().multiplyScalar(f);
              a.force.add(d);
              b.force.sub(d);
            }
          }

          for (const e of state.edges) {
            const a = state.nodes[e.a];
            const b = state.nodes[e.b];
            if (!a || !b) continue;
            if (a.visibleByFilter === false || b.visibleByFilter === false)
              continue;
            const d = new THREE.Vector3(
              b.pos.x - a.pos.x,
              (b.pos.y - a.pos.y) * 0.2,
              b.pos.z - a.pos.z,
            );
            const dist = Math.max(0.001, d.length());
            const target = e.weak ? baseDist * 1.2 : baseDist;
            const stretch = dist - target;
            d.normalize().multiplyScalar(spring * stretch);
            a.force.add(d);
            b.force.sub(d);
          }

          for (const idx of active) {
            const n = state.nodes[idx];
            const toHome = new THREE.Vector3().subVectors(n.home, n.pos);
            n.force.addScaledVector(toHome, anchorPull);
            n.vel.addScaledVector(n.force, 0.018);
            n.vel.multiplyScalar(damping);
            n.vel.clampLength(0, 1.6);
            n.pos.add(n.vel);
            n.mesh.position.copy(n.pos);
          }

          updateEdges();
        }

        function pickAt(clientX, clientY) {
          const rect = dom.canvas.getBoundingClientRect();
          pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
          pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
          raycaster.setFromCamera(pointer, camera);
          const hits = raycaster.intersectObjects(nodesGroup.children, false);
          if (!hits.length) {
            selectNode(-1);
            return;
          }
          const idx = hits[0].object.userData.index;
          selectNode(idx);
        }

        async function detectAssetBase(project) {
          const sample = (project.nodes || [])
            .flatMap((n) => {
              const data = nodePayload(n);
              if (Array.isArray(data.files)) return data.files;
              if (Array.isArray(n?.files)) return n.files;
              return [];
            })
            .map((f) => {
              const probe = f && (f.path || f.url || f.name);
              return typeof probe === "string" ? probe : "";
            })
            .find((p) => p.trim().length > 0);

          if (!sample) return "";

          const candidates = [];
          const params = new URLSearchParams(window.location.search);
          const qp = params.get("project");
          if (qp) candidates.push(`${qp}/`);
          for (const folder of KNOWN_FOLDERS) candidates.push(`${folder}/`);
          candidates.push("");

          for (const base of candidates) {
            const url = `${base}${sample}`;
            try {
              const res = await fetch(url, { cache: "no-store" });
              if (res.ok) return base;
            } catch (_) {
              // ignore
            }
          }

          return "";
        }

        async function loadProjectSource(project, label, preferredBase = "") {
          buildGraph(project, label);
          state.assetBase = preferredBase || (await detectAssetBase(project));
          state.folderName = inferFolderNameFromBase(state.assetBase);
          updateAllNodeLabelAssets();
          persistSharedProjectState("space");
        }

        async function loadFromJsonFile(file, label = "") {
          const text = await file.text();
          const project = JSON.parse(text);
          await loadProjectSource(
            project,
            label || file.name.replace(/\.json$/i, ""),
          );
          await window.OvertraceUI?.clearProjectFsContext?.();

          if (state.assetBase) {
            setHint(
              `Project loaded: ${file.name} · asset base: ${state.assetBase}`,
              "ok",
            );
          } else {
            setHint(
              "Project loaded. Asset base could not be detected automatically.",
              "warn",
            );
          }

          if (state.selected >= 0) {
            renderNodeMedia(state.nodes[state.selected]);
          }
        }

        async function loadFromFolderContext(entry) {
          const folderName = entry?.folderName || entry?.dirHandle?.name || "";
          const label =
            folderName || entry?.fileName?.replace(/\.json$/i, "") || "Project";
          const assetBase =
            entry?.assetBase || (folderName ? `${folderName}/` : "");
          await loadProjectSource(entry.project, label, assetBase);
          const fsContext = window.OvertraceUI?.buildProjectFsContext?.(entry);
          if (fsContext) {
            await window.OvertraceUI?.saveProjectFsContext?.(fsContext);
          }
          setHint(
            `Project loaded: ${folderName || "project"}/project.json`,
            "ok",
          );
        }

        function buildOverviewProject(entries) {
          const merged = { nodes: [], edges: [] };

          for (const entry of entries) {
            const folder = entry?.folder;
            const project = entry?.project;
            if (!folder || !project) continue;
            const rawNodes = Array.isArray(project.nodes) ? project.nodes : [];
            const rawEdges = Array.isArray(project.edges) ? project.edges : [];
            const idMap = new Map();

            for (let i = 0; i < rawNodes.length; i++) {
              const rawNode = rawNodes[i];
              const oldId = String(rawNode?.id || `node_${i}`);
              const newId = `${folder}::${oldId}`;
              idMap.set(oldId, newId);

              const payload = nodePayload(rawNode);
              const data = {
                ...payload,
                files: [],
                sourceProject: folder,
              };
              merged.nodes.push({ id: newId, data });
            }

            for (const rawEdge of rawEdges) {
              const sourceRaw = rawEdge?.s ?? rawEdge?.source ?? rawEdge?.from;
              const targetRaw = rawEdge?.t ?? rawEdge?.target ?? rawEdge?.to;
              if (sourceRaw == null || targetRaw == null) continue;
              const s = idMap.get(String(sourceRaw));
              const t = idMap.get(String(targetRaw));
              if (!s || !t) continue;
              merged.edges.push({
                s,
                t,
                weak: !!rawEdge?.weak,
              });
            }
          }

          return merged;
        }

        async function loadOverviewFromKnownFolders() {
          const loaded = await Promise.all(
            KNOWN_FOLDERS.map(async (folder) => {
              try {
                const res = await fetch(`${folder}/project.json`, {
                  cache: "no-store",
                });
                if (!res.ok) return null;
                const project = await res.json();
                return { folder, project };
              } catch (_) {
                return null;
              }
            }),
          );

          const entries = loaded.filter(Boolean);
          if (!entries.length) {
            setHint("Overview unavailable: no project.json found.", "warn");
            return false;
          }

          const mergedProject = buildOverviewProject(entries);
          if (
            !Array.isArray(mergedProject.nodes) ||
            mergedProject.nodes.length === 0
          ) {
            setHint("Overview unavailable: no valid nodes found.", "warn");
            return false;
          }

          buildGraph(mergedProject, `Overview · ${entries.length} projects`);
          state.assetBase = "";
          state.folderName = null;
          state.showImages = false;
          applyImagesVisibility();
          setHint(
            `Overview loaded: ${entries.length} projects · ${mergedProject.nodes.length} nodes · ${mergedProject.edges.length} edges`,
            "ok",
          );
          return true;
        }

        async function openJsonDialog() {
          if (state.openDialogPending) return;
          state.openDialogPending = true;
          try {
            if (
              "showDirectoryPicker" in window &&
              window.OvertraceUI?.openProjectFolder
            ) {
              try {
                const entry = await window.OvertraceUI.openProjectFolder({
                  mode: "readwrite",
                });
                await loadFromFolderContext(entry);
                return;
              } catch (err) {
                if (err && err.name === "AbortError") return;
                if (err && err.name === "NotFoundError") {
                  setHint(
                    "project.json not found in the selected folder.",
                    "warn",
                  );
                  return;
                }
                console.warn("Folder open failed in Space view", err);
                setHint("Unable to open the project folder.", "warn");
                return;
              }
            }

            if (
              "showOpenFilePicker" in window &&
              window.OvertraceUI?.openProjectJsonFile
            ) {
              try {
                const entry = await window.OvertraceUI.openProjectJsonFile({
                  description: "JSON",
                });
                if (!entry) return;
                await loadFromJsonFile(entry.file, entry.fileName || "");
                const fsContext =
                  window.OvertraceUI?.buildProjectFsContext?.(entry);
                if (fsContext) {
                  await window.OvertraceUI?.saveProjectFsContext?.(fsContext);
                }
                return;
              } catch (err) {
                if (err && err.name === "AbortError") return;
              }
            }

            dom.fileInput.value = "";
            dom.fileInput.click();
          } finally {
            state.openDialogPending = false;
          }
        }

        function resizeDisciplineCanvas() {
          const side = Math.round(dom.disciplineWrap.clientWidth || 0);
          if (!side) return;
          dom.disciplineWrap.style.height = `${side}px`;
          const w = side;
          const h = side;
          const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
          discipline.width = w;
          discipline.height = h;
          discipline.pixelRatio = pixelRatio;
          dom.disciplineCanvas.width = Math.floor(w * pixelRatio);
          dom.disciplineCanvas.height = Math.floor(h * pixelRatio);
          dom.disciplineCanvas.style.width = `${w}px`;
          dom.disciplineCanvas.style.height = `${h}px`;
        }

        function onResize() {
          const w = dom.viewWrap.clientWidth;
          const h = dom.viewWrap.clientHeight;
          if (w && h) {
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h, false);
          }
          resizeDisciplineCanvas();
          if (dom.lineChart || dom.miniMap || dom.totalsChart) {
            state.dataViewsDirty = true;
            renderAnalysisDataViews();
          }
        }

        function applyZoomDelta(deltaY, isPinch = false) {
          const sensitivity = isPinch ? 0.0004 : 0.00055;
          controls.radius *= Math.exp(deltaY * sensitivity);
        }

        function touchDistance(t1, t2) {
          const dx = t2.clientX - t1.clientX;
          const dy = t2.clientY - t1.clientY;
          return Math.hypot(dx, dy);
        }

        function touchCenter(t1, t2) {
          return {
            x: (t1.clientX + t2.clientX) * 0.5,
            y: (t1.clientY + t2.clientY) * 0.5,
          };
        }

        function wireDropZone() {
          const enter = (e) => {
            e.preventDefault();
            dom.viewWrap.classList.add("drop");
            setHint("Drop the project.json file", "ok");
          };
          const leave = (e) => {
            e.preventDefault();
            dom.viewWrap.classList.remove("drop");
            setIdleStatus();
          };
          const over = (e) => {
            e.preventDefault();
          };
          const drop = async (e) => {
            e.preventDefault();
            dom.viewWrap.classList.remove("drop");
            const files = e.dataTransfer && e.dataTransfer.files;
            const file = files && files[0];
            if (!file) return;
            if (!/\.json$/i.test(file.name)) {
              setHint("The dropped file is not a JSON file.", "warn");
              return;
            }
            try {
              await loadFromJsonFile(file);
            } catch (err) {
              setHint(`JSON open error: ${err.message || err}`, "warn");
            }
          };

          dom.viewWrap.addEventListener("dragenter", enter);
          dom.viewWrap.addEventListener("dragover", over);
          dom.viewWrap.addEventListener("dragleave", leave);
          dom.viewWrap.addEventListener("drop", drop);
        }

              if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT")
                return;

              const k = e.key.toLowerCase();
              const cmdOpen = (e.metaKey || e.ctrlKey) && k === "o";
              const plainOpen =
                !e.metaKey &&
                !e.ctrlKey &&
